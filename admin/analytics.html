<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Analytics - MAJAY</title>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="dashboard-page admin-dashboard">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="admin-sidebar-toggle" onclick="toggleAdminSidebar()" aria-label="Toggle sidebar">
        <span id="adminToggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="admin-sidebar-overlay" id="adminSidebarOverlay" onclick="closeAdminSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper admin-wrapper">
        <!-- Sidebar injecté par initAdminNav() -->

        <!-- Main Content -->
        <main class="dashboard-main admin-main">
            <div class="admin-main-content">
                <div class="page-header" style="margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px;">
                    <div>
                        <h1 class="page-title" style="font-size: 1.8em; font-weight: 700; color: #37352f; margin-bottom: 6px;">
                            Statistiques de la Plateforme
                        </h1>
                        <p class="page-subtitle" style="color: #6b6b6b; font-size: 14px;">Analyses et donnees de la base de donnees</p>
                    </div>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <button onclick="exporterRapportGlobal()" class="btn btn-primary" id="exportGlobalBtn" style="background: #2383e2; min-height: 40px; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;">
                            Exporter le rapport global
                        </button>
                        <button onclick="exporterDonnees()" class="btn btn-outline" style="min-height: 40px; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; border: 1px solid #e5e5e3; background: white; color: #37352f;">Exporter les donnees</button>
                    </div>
                </div>

                <div class="stats-grid" id="analyticsGrid" style="margin-bottom: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <div class="loader"></div>
                        <p style="margin-top: 15px; color: #6b6b6b; font-size: 13px;">Chargement des statistiques...</p>
                    </div>
                </div>

                <div class="admin-card-relief" style="border: 1px solid #e5e5e3; border-radius: 8px; padding: 20px;">
                    <div class="card-header" style="margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e5e3;">
                        <h2 style="font-size: 1.2em; font-weight: 600; color: #37352f;">
                            Analyses detaillees
                        </h2>
                    </div>
                    <div class="card-body" id="analyticsDetails">
                        <div class="loader"></div>
                        <p style="text-align: center; margin-top: 15px; color: #6b6b6b; font-size: 13px;">Chargement...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { adminAuth } from "../js/admin-auth.js";
        import { adminRoles, requirePermission } from "../js/admin-roles.js";
        import { showSuccess, showError, showInfo } from "../js/notifications.js";
        import { exporterRapportGlobal } from "../js/admin-analytics.js";
        import { initAdminApp } from "../js/admin-app.js";
        import { afficherEtatVide } from "../js/admin-utils.js";

        // Initialiser l'app admin (charge le sidebar et le router)
        initAdminApp();

        const session = adminRoles.getAdminSession();
        if (!session) window.location.href = 'connexion.html';

        const hasAccess = await requirePermission('view_analytics');
        if (!hasAccess) return;

        async function chargerAnalytics() {
            try {
                // Statistiques globales
                const [storesCount, productsCount, ordersCount, usersCount] = await Promise.all([
                    supabase.from('stores').select('*', { count: 'exact', head: true }),
                    supabase.from('products').select('*', { count: 'exact', head: true }),
                    supabase.from('orders').select('*', { count: 'exact', head: true }),
                    supabase.from('users').select('*', { count: 'exact', head: true })
                ]);

                document.getElementById('analyticsGrid').innerHTML = `
                    <div class="stat-card admin-stat-relief" style="border: 1px solid #e5e5e3; border-radius: 8px; padding: 16px;">
                        <div class="stat-label" style="color: #6b6b6b; font-size: 13px;">Boutiques</div>
                        <div class="stat-value" style="font-size: 1.8em; font-weight: 700; color: #37352f;">${storesCount.count || 0}</div>
                    </div>
                    <div class="stat-card admin-stat-relief" style="border: 1px solid #e5e5e3; border-radius: 8px; padding: 16px;">
                        <div class="stat-label" style="color: #6b6b6b; font-size: 13px;">Produits</div>
                        <div class="stat-value" style="font-size: 1.8em; font-weight: 700; color: #37352f;">${productsCount.count || 0}</div>
                    </div>
                    <div class="stat-card admin-stat-relief" style="border: 1px solid #e5e5e3; border-radius: 8px; padding: 16px;">
                        <div class="stat-label" style="color: #6b6b6b; font-size: 13px;">Commandes</div>
                        <div class="stat-value" style="font-size: 1.8em; font-weight: 700; color: #37352f;">${ordersCount.count || 0}</div>
                    </div>
                    <div class="stat-card admin-stat-relief" style="border: 1px solid #e5e5e3; border-radius: 8px; padding: 16px;">
                        <div class="stat-label" style="color: #6b6b6b; font-size: 13px;">Utilisateurs</div>
                        <div class="stat-value" style="font-size: 1.8em; font-weight: 700; color: #37352f;">${usersCount.count || 0}</div>
                    </div>
                `;

                // Analyses détaillées
                const { data: orders } = await supabase
                    .from('orders')
                    .select('status, total, created_at')
                    .order('created_at', { ascending: false })
                    .limit(100);

                const statsByStatus = {};
                orders?.forEach(order => {
                    statsByStatus[order.status] = (statsByStatus[order.status] || 0) + 1;
                });

                if (!orders || orders.length === 0) {
                    document.getElementById('analyticsDetails').innerHTML = afficherEtatVide("Aucune commande enregistree");
                } else {
                    document.getElementById('analyticsDetails').innerHTML = `
                        <h3 style="font-size: 1em; font-weight: 600; color: #37352f; margin-bottom: 16px;">Repartition des commandes par statut</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;">
                            ${Object.entries(statsByStatus).map(([status, count]) => `
                                <div style="text-align: center; padding: 20px; border: 1px solid #e5e5e3; border-radius: 8px;">
                                    <div style="font-size: 2em; font-weight: 700; color: #37352f; margin-bottom: 6px;">${count}</div>
                                    <div style="color: #6b6b6b; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">${status}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        }

        window.exporterDonnees = async function() {
            if (!await requirePermission('export_data')) return;
            const { showInfo } = await import("../js/notifications.js");
            showInfo('Fonctionnalité d\'export en développement');
        };

        window.exporterRapportGlobal = async function() {
            if (!await requirePermission('export_data')) {
                showError('Vous n\'avez pas la permission d\'exporter des données');
                return;
            }

            const btn = document.getElementById('exportGlobalBtn');
            const originalText = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = 'Generation du rapport...';

                showInfo('Génération du rapport en cours... Cela peut prendre quelques instants.');

                await exporterRapportGlobal('rapport-global-majay');

                showSuccess('Rapport exporté avec succès !');
            } catch (error) {
                console.error('Erreur export rapport:', error);
                showError('Erreur lors de l\'export du rapport: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };

        chargerAnalytics();
    </script>
</body>
</html>
