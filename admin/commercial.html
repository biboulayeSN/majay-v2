<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Commercial - MAJAY</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .admin-header {
            background: #ffffff;
            color: #37352f;
            border-bottom: 1px solid #e5e5e3;
        }
        .admin-nav a { color: #37352f; }
        .admin-nav a.active { background: #f7f7f5; }
    </style>
</head>
<body class="dashboard-page">
    <header class="dashboard-header admin-header">
        <div class="dashboard-header-content">
            <div class="dashboard-logo" style="color: #37352f; font-weight: 700;">ADMIN COMMERCIAL</div>
            <nav class="dashboard-nav admin-nav">
                <a href="commercial.html" class="nav-link active">Vendeurs</a>
                <a href="commercial-stores.html" class="nav-link">Boutiques</a>
            </nav>
            <button onclick="deconnexionAdmin()" class="btn btn-outline btn-sm" style="color: #37352f; border-color: #e5e5e3;">Deconnexion</button>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="page-header">
            <div>
                <h1 class="page-title" style="color: #37352f; font-weight: 700;">Gestion des Vendeurs Proprietaires</h1>
                <p class="page-subtitle" style="color: #6b6b6b; font-size: 14px;">Gerer les vendeurs et leurs boutiques</p>
            </div>
        </div>

        <div class="filters-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un vendeur..." style="border: 1px solid #e5e5e3; border-radius: 6px;">
            <select class="filter-select" id="statusFilter" style="border: 1px solid #e5e5e3; border-radius: 6px;">
                <option value="">Tous les statuts</option>
                <option value="active">Actifs</option>
                <option value="inactive">Inactifs</option>
            </select>
            <select class="filter-select" id="planFilter" style="border: 1px solid #e5e5e3; border-radius: 6px;">
                <option value="">Tous les plans</option>
                <option value="free">Free</option>
                <option value="pro">Pro</option>
                <option value="entreprise">Entreprise</option>
            </select>
        </div>

        <div class="card" style="border: 1px solid #e5e5e3; border-radius: 8px; box-shadow: none;">
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr style="background: #f7f7f5;">
                                <th style="color: #37352f;">Nom</th>
                                <th style="color: #37352f;">Telephone</th>
                                <th style="color: #37352f;">Boutique</th>
                                <th style="color: #37352f;">Plan</th>
                                <th style="color: #37352f;">Statut</th>
                                <th style="color: #37352f;">Commandes</th>
                                <th style="color: #37352f;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vendorsTable">
                            <tr><td colspan="7" style="text-align: center; padding: 40px;">Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { adminAuth } from "../js/admin-auth.js";
        import { adminRoles, requirePermission } from "../js/admin-roles.js";
        import { showSuccess, showError } from "../js/notifications.js";

        const session = adminRoles.getAdminSession();
        if (!session) window.location.href = 'connexion.html';

        // Vérifier les permissions
        const hasAccess = await requirePermission('view_vendors');
        if (!hasAccess) return;

        window.deconnexionAdmin = () => adminAuth.deconnexionAdmin();

        async function chargerVendeurs() {
            try {
                const { data: vendors, error } = await supabase
                    .from('users')
                    .select(`
                        id,
                        phone,
                        email,
                        full_name,
                        is_active,
                        stores (
                            id,
                            name,
                            slug,
                            subscription_plan,
                            total_orders,
                            is_active
                        )
                    `)
                    .eq('role_type', 'owner')
                    .is('admin_role', null)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!vendors || vendors.length === 0) {
                    document.getElementById('vendorsTable').innerHTML = `
                        <tr><td colspan="7" class="empty-state">
                            <h3>Aucun vendeur</h3>
                        </td></tr>
                    `;
                    return;
                }

                document.getElementById('vendorsTable').innerHTML = vendors.map(vendor => {
                    const store = vendor.stores && vendor.stores.length > 0 ? vendor.stores[0] : null;
                    const plan = store?.subscription_plan || 'free';

                    return `
                        <tr>
                            <td><strong>${vendor.full_name || 'N/A'}</strong></td>
                            <td>${vendor.phone}</td>
                            <td>${store ? store.name : 'Aucune boutique'}</td>
                            <td><span class="badge badge-${plan}">${plan.toUpperCase()}</span></td>
                            <td>
                                <span class="badge ${vendor.is_active ? 'badge-success' : 'badge-danger'}">
                                    ${vendor.is_active ? 'Actif' : 'Inactif'}
                                </span>
                            </td>
                            <td>${store?.total_orders || 0}</td>
                            <td>
                                <button onclick="toggleVendor('${vendor.id}', ${!vendor.is_active})"
                                        class="btn btn-sm ${vendor.is_active ? 'btn-danger' : 'btn-success'}" style="min-height: 32px; font-size: 13px;">
                                    ${vendor.is_active ? 'Desactiver' : 'Activer'}
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        }

        window.toggleVendor = async function(userId, isActive) {
            if (!await requirePermission('activate_vendors')) return;

            try {
                const { error } = await supabase
                    .from('users')
                    .update({ is_active: isActive, updated_at: new Date().toISOString() })
                    .eq('id', userId);

                if (error) throw error;
                showSuccess(`Vendeur ${isActive ? 'activé' : 'désactivé'} avec succès`);
                chargerVendeurs();
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        };

        chargerVendeurs();
    </script>
</body>
</html>
