<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - SAMASTORE</title>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="logo">ADMIN</h1>
            <p class="tagline">Espace SuperAdmin</p>
        </div>

        <div class="auth-card">
            <h2>Connexion SuperAdmin</h2>
            <p class="auth-subtitle">Acces reserve aux administrateurs</p>

            <form id="adminForm" class="auth-form" style="display: block;">
                <div class="form-group">
                    <label for="telephone" class="form-label">Numero de telephone</label>
                    <input type="tel" id="telephone" class="form-control" required placeholder="780181144" autofocus aria-required="true" aria-label="Numero de telephone" aria-describedby="telHint">
                    <span class="form-hint" id="telHint">Entrez votre numero de telephone</span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" id="password" class="form-control" required placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" aria-required="true" aria-label="Mot de passe" aria-describedby="pwdHint">
                    <span class="form-hint" id="pwdHint">Entrez votre mot de passe</span>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="min-height: 40px;">
                    <span class="btn-text">Se connecter</span>
                    <span class="btn-loader" style="display:none">...</span>
                </button>
            </form>

            <div class="auth-footer mt-4">
                <a href="../index.html" class="text-primary">Retour a l'accueil</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { adminAuth } from "../js/admin-auth.js";

        document.getElementById('adminForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = e.target.querySelector('button[type="submit"]');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline';

            try {
                const tel = document.getElementById('telephone').value.trim();
                const password = document.getElementById('password').value;
                const result = await adminAuth.connexionAdmin(tel, password);

                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';

                if (result.success) {
                    const { showSuccess } = await import("../js/notifications.js");
                    showSuccess("Connexion reussie ! Redirection...");
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                const { showError } = await import("../js/notifications.js");
                showError(error.message);
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
