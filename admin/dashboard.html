<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - SAMASTORE</title>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="dashboard-page">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="admin-sidebar-toggle" onclick="toggleAdminSidebar()" aria-label="Toggle sidebar">
        <span id="adminToggleIcon">&#9776;</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="admin-sidebar-overlay" id="adminSidebarOverlay" onclick="closeAdminSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper admin-wrapper">
        <!-- Sidebar injecte par initAdminNav() -->

        <!-- Main Content -->
        <main class="dashboard-main admin-main">
            <div class="admin-main-content">
                <div class="page-header mb-6">
                    <div>
                        <h1 class="page-title">Tableau de bord SuperAdmin</h1>
                        <p class="page-subtitle">Vue d'ensemble de la plateforme</p>
                    </div>
                </div>

                <div class="stats-grid" id="statsGrid" style="margin-bottom: 24px;">
                    <div style="grid-column: 1/-1; text-align: center; padding: 32px;">
                        <p class="text-text-secondary text-sm">Chargement des statistiques...</p>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h2 class="text-base font-semibold text-text">Comptes en attente d'approbation</h2>
                    </div>
                    <div id="demandesListe">
                        <p class="text-text-secondary text-sm text-center py-4">Chargement...</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="text-base font-semibold text-text">Dernieres commandes</h2>
                    </div>
                    <div id="commandesRecentes">
                        <p class="text-text-secondary text-sm text-center py-4">Chargement...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { adminAuth } from "../js/admin-auth.js";
        import { initAdminApp } from "../js/admin-app.js";
        import { afficherEtatVide } from "../js/admin-utils.js";

        initAdminApp();

        const admin = adminAuth.verifierAuthAdmin();
        if (!admin) {
            window.location.href = 'connexion.html';
        }

        async function chargerStats() {
            try {
                const stats = await adminAuth.getStatsAdmin();

                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Total Vendeurs</div>
                        <div class="stat-value">${stats.total_vendeurs}</div>
                        <p class="text-xs text-text-secondary mt-1">Actifs: ${stats.vendeurs_actifs} | Inactifs: ${stats.vendeurs_inactifs}</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Produits</div>
                        <div class="stat-value">${stats.total_produits}</div>
                        <p class="text-xs text-text-secondary mt-1">Free: ${stats.vendeurs_free} | Pro: ${stats.vendeurs_pro} | Ent: ${stats.vendeurs_entreprise}</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Commandes</div>
                        <div class="stat-value">${stats.total_commandes}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Volume Total</div>
                        <div class="stat-value">${parseFloat(stats.volume_ventes_total).toLocaleString()} FCFA</div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                document.getElementById('statsGrid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 32px;">
                        <p class="text-danger text-sm">Erreur lors du chargement des statistiques</p>
                    </div>
                `;
            }
        }

        async function chargerDemandes() {
            try {
                const { data, error } = await supabase
                    .from('stores')
                    .select(`
                        id, name, slug, is_active, created_at,
                        owner:users!stores_owner_id_fkey ( phone, full_name )
                    `)
                    .eq('is_active', false)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('demandesListe').innerHTML = `
                        <div class="empty-state py-6">
                            <p class="text-text-secondary text-sm">Aucune demande d'approbation en attente</p>
                        </div>
                    `;
                    return;
                }

                document.getElementById('demandesListe').innerHTML = data.map(store => {
                    const owner = Array.isArray(store.owner) ? store.owner[0] : store.owner;
                    return `
                    <div class="p-4 border border-warning rounded-lg mb-3">
                        <div class="flex justify-between items-start flex-wrap gap-4">
                            <div class="flex-1 min-w-0">
                                <h3 class="text-sm font-semibold text-text mb-2">${store.name}</h3>
                                <p class="text-xs text-text-secondary">${owner?.full_name || 'N/A'} &mdash; ${owner?.phone || 'N/A'}</p>
                                <p class="text-xs text-text-secondary">nayatoo.com/${store.slug}</p>
                                <p class="text-xs text-text-tertiary mt-1">
                                    Inscrit le ${new Date(store.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' })}
                                </p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approuverStore('${store.id}')" class="btn btn-primary btn-sm">Approuver</button>
                                <button onclick="rejeterStore('${store.id}')" class="btn btn-sm" style="background: #fbe9e9; color: #c53030; border: 1px solid #e5e5e3;">Rejeter</button>
                            </div>
                        </div>
                    </div>
                `;
                }).join('');
            } catch (error) {
                console.error(error);
            }
        }

        window.approuverStore = async function(id) {
            if (!confirm('Approuver cette boutique ?')) return;
            try {
                await adminAuth.toggleStore(id, true);
                alert('Boutique approuvee !');
                chargerDemandes();
                chargerStats();
            } catch (error) {
                alert(error.message);
            }
        };

        window.rejeterStore = async function(id) {
            if (!confirm('Rejeter cette boutique ?')) return;
            try {
                await adminAuth.supprimerStore(id);
                alert('Boutique rejetee');
                chargerDemandes();
                chargerStats();
            } catch (error) {
                alert(error.message);
            }
        };

        async function chargerCommandesRecentes() {
            try {
                const { data, error } = await supabase
                    .from('orders')
                    .select(`*, stores!inner ( name, slug )`)
                    .order('created_at', { ascending: false })
                    .limit(10);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('commandesRecentes').innerHTML = `
                        <div class="empty-state py-6">
                            <p class="text-text-secondary text-sm">Aucune commande recente</p>
                        </div>
                    `;
                    return;
                }

                document.getElementById('commandesRecentes').innerHTML = `
                    <div style="overflow-x: auto;">
                        <table class="admin-table-relief w-full">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Boutique</th>
                                    <th>Articles</th>
                                    <th>Montant</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(c => {
                                    const store = Array.isArray(c.stores) ? c.stores[0] : c.stores;
                                    const itemsCount = Array.isArray(c.items) ? c.items.length : 0;
                                    return `
                                    <tr>
                                        <td>${new Date(c.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' })}</td>
                                        <td>${store?.name || 'N/A'}</td>
                                        <td>${itemsCount} article(s)</td>
                                        <td class="font-semibold">${parseInt(c.total || 0).toLocaleString()} ${c.currency || 'XOF'}</td>
                                    </tr>
                                `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                console.error(error);
            }
        }

        chargerStats();
        chargerDemandes();
        chargerCommandesRecentes();
    </script>
</body>
</html>
