<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Financial - MAJAY</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .admin-header {
            background: #ffffff;
            color: #37352f;
            border-bottom: 1px solid #e5e5e3;
        }
        .admin-nav a { color: #37352f; }
        .admin-nav a.active { background: #f7f7f5; }
    </style>
</head>
<body class="dashboard-page">
    <header class="dashboard-header admin-header">
        <div class="dashboard-header-content">
            <div class="dashboard-logo" style="color: #37352f; font-weight: 700;">ADMIN FINANCIAL</div>
            <nav class="dashboard-nav admin-nav">
                <a href="financial.html" class="nav-link active">Paiements</a>
                <a href="financial-invoices.html" class="nav-link">Factures</a>
                <a href="financial-subscriptions.html" class="nav-link">Abonnements</a>
            </nav>
            <button onclick="deconnexionAdmin()" class="btn btn-outline btn-sm" style="color: #37352f; border-color: #e5e5e3;">Deconnexion</button>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="page-header">
            <div>
                <h1 class="page-title" style="color: #37352f; font-weight: 700;">Gestion des Paiements</h1>
                <p class="page-subtitle" style="color: #6b6b6b; font-size: 14px;">Verification et conformite des paiements</p>
            </div>
        </div>

        <div class="filters-bar">
            <select class="filter-select" id="statusFilter" style="border: 1px solid #e5e5e3; border-radius: 6px;">
                <option value="">Tous les statuts</option>
                <option value="paid">Payes</option>
                <option value="unpaid">Non payes</option>
                <option value="partial">Partiels</option>
                <option value="overdue">En retard</option>
            </select>
            <input type="date" class="filter-select" id="dateFrom" placeholder="Date debut" style="border: 1px solid #e5e5e3; border-radius: 6px;">
            <input type="date" class="filter-select" id="dateTo" placeholder="Date fin" style="border: 1px solid #e5e5e3; border-radius: 6px;">
        </div>

        <div class="card" style="border: 1px solid #e5e5e3; border-radius: 8px; box-shadow: none;">
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr style="background: #f7f7f5;">
                                <th style="color: #37352f;">Facture</th>
                                <th style="color: #37352f;">Boutique</th>
                                <th style="color: #37352f;">Montant</th>
                                <th style="color: #37352f;">Statut</th>
                                <th style="color: #37352f;">Date</th>
                                <th style="color: #37352f;">Verification</th>
                                <th style="color: #37352f;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsTable">
                            <tr><td colspan="7" style="text-align: center; padding: 40px;">Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { adminAuth } from "../js/admin-auth.js";
        import { adminRoles, requirePermission } from "../js/admin-roles.js";
        import { showSuccess, showError } from "../js/notifications.js";

        const session = adminRoles.getAdminSession();
        if (!session) window.location.href = 'connexion.html';

        const hasAccess = await requirePermission('view_payments');
        if (!hasAccess) return;

        window.deconnexionAdmin = () => adminAuth.deconnexionAdmin();

        async function chargerPaiements() {
            try {
                const { data: invoices, error } = await supabase
                    .from('invoices')
                    .select(`
                        id,
                        invoice_number,
                        amount,
                        status,
                        due_date,
                        paid_at,
                        store:stores!invoices_store_id_fkey (
                            name,
                            slug
                        )
                    `)
                    .order('created_at', { ascending: false })
                    .limit(100);

                if (error) throw error;

                if (!invoices || invoices.length === 0) {
                    document.getElementById('paymentsTable').innerHTML = `
                        <tr><td colspan="7" class="empty-state">
                            <h3>Aucun paiement</h3>
                        </td></tr>
                    `;
                    return;
                }

                const statusLabels = {
                    'paid': 'Paye',
                    'unpaid': 'Non paye',
                    'partial': 'Partiel',
                    'overdue': 'En retard',
                    'refunded': 'Rembourse'
                };

                const statusClasses = {
                    'paid': 'badge-success',
                    'unpaid': 'badge-danger',
                    'partial': 'badge-warning',
                    'overdue': 'badge-danger',
                    'refunded': 'badge-warning'
                };

                document.getElementById('paymentsTable').innerHTML = invoices.map(invoice => {
                    return `
                        <tr>
                            <td><strong>${invoice.invoice_number}</strong></td>
                            <td>${invoice.store?.name || 'N/A'}</td>
                            <td>${parseInt(invoice.amount || 0).toLocaleString()} XOF</td>
                            <td><span class="badge ${statusClasses[invoice.status]}">${statusLabels[invoice.status] || invoice.status}</span></td>
                            <td>${new Date(invoice.due_date).toLocaleDateString('fr-FR')}</td>
                            <td>${invoice.paid_at ? 'Verifie' : 'En attente'}</td>
                            <td>
                                ${invoice.status !== 'paid' ? `
                                    <button onclick="verifierPaiement('${invoice.id}')"
                                            class="btn btn-sm btn-success" style="min-height: 32px; font-size: 13px;">
                                        Verifier
                                    </button>
                                ` : ''}
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        }

        window.verifierPaiement = async function(invoiceId) {
            if (!await requirePermission('verify_payments')) return;

            try {
                const { error } = await supabase
                    .from('invoices')
                    .update({
                        status: 'paid',
                        paid_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', invoiceId);

                if (error) throw error;
                showSuccess('Paiement vérifié avec succès');
                chargerPaiements();
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        };

        chargerPaiements();
    </script>
</body>
</html>
