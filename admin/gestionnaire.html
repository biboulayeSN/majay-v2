<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gestionnaire - MAJAY</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .admin-header {
            background: #ffffff;
            color: #37352f;
            border-bottom: 1px solid #e5e5e3;
        }
        .admin-nav a { color: #37352f; }
        .admin-nav a.active { background: #f7f7f5; }
    </style>
</head>
<body class="dashboard-page">
    <header class="dashboard-header admin-header">
        <div class="dashboard-header-content">
            <div class="dashboard-logo" style="color: #37352f; font-weight: 700;">ADMIN GESTIONNAIRE</div>
            <nav class="dashboard-nav admin-nav">
                <a href="gestionnaire.html" class="nav-link active">Boutiques</a>
                <a href="gestionnaire-enterprise.html" class="nav-link">Vendeurs Entreprise</a>
            </nav>
            <button onclick="deconnexionAdmin()" class="btn btn-outline btn-sm" style="color: #37352f; border-color: #e5e5e3;">Deconnexion</button>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="page-header">
            <div>
                <h1 class="page-title" style="color: #37352f; font-weight: 700;">Gestion des Boutiques</h1>
                <p class="page-subtitle" style="color: #6b6b6b; font-size: 14px;">Restrictions, bannissements et gestion des produits</p>
            </div>
        </div>

        <div class="filters-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Rechercher une boutique..." style="border: 1px solid #e5e5e3; border-radius: 6px;">
            <select class="filter-select" id="statusFilter" style="border: 1px solid #e5e5e3; border-radius: 6px;">
                <option value="">Tous les statuts</option>
                <option value="active">Actives</option>
                <option value="banned">Bannies</option>
                <option value="restricted">Restreintes</option>
            </select>
        </div>

        <div class="card" style="border: 1px solid #e5e5e3; border-radius: 8px; box-shadow: none;">
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr style="background: #f7f7f5;">
                                <th style="color: #37352f;">Boutique</th>
                                <th style="color: #37352f;">Proprietaire</th>
                                <th style="color: #37352f;">Plan</th>
                                <th style="color: #37352f;">Produits</th>
                                <th style="color: #37352f;">Statut</th>
                                <th style="color: #37352f;">Restrictions</th>
                                <th style="color: #37352f;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="storesTable">
                            <tr><td colspan="7" style="text-align: center; padding: 40px;">Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { adminAuth } from "../js/admin-auth.js";
        import { adminRoles, requirePermission } from "../js/admin-roles.js";
        import { showSuccess, showError, showInfo } from "../js/notifications.js";

        const session = adminRoles.getAdminSession();
        if (!session) window.location.href = 'connexion.html';

        const hasAccess = await requirePermission('view_stores');
        if (!hasAccess) return;

        window.deconnexionAdmin = () => adminAuth.deconnexionAdmin();

        async function chargerBoutiques() {
            try {
                const { data: stores, error } = await supabase
                    .from('stores')
                    .select(`
                        id,
                        name,
                        slug,
                        subscription_plan,
                        is_active,
                        owner:users!stores_owner_id_fkey (
                            full_name,
                            phone
                        ),
                        products:products!products_store_id_fkey (
                            id,
                            is_active
                        )
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!stores || stores.length === 0) {
                    document.getElementById('storesTable').innerHTML = `
                        <tr><td colspan="7" class="empty-state">
                            <h3>Aucune boutique</h3>
                        </td></tr>
                    `;
                    return;
                }

                document.getElementById('storesTable').innerHTML = stores.map(store => {
                    const activeProducts = store.products?.filter(p => p.is_active).length || 0;
                    const totalProducts = store.products?.length || 0;

                    return `
                        <tr>
                            <td><strong>${store.name}</strong><br><small style="color: #6b6b6b;">${store.slug}</small></td>
                            <td>${store.owner?.full_name || 'N/A'}<br><small style="color: #6b6b6b;">${store.owner?.phone || ''}</small></td>
                            <td><span class="badge badge-${store.subscription_plan}">${store.subscription_plan.toUpperCase()}</span></td>
                            <td>${activeProducts} / ${totalProducts}</td>
                            <td>
                                <span class="badge ${store.is_active ? 'badge-success' : 'badge-danger'}">
                                    ${store.is_active ? 'Active' : 'Bannie'}
                                </span>
                            </td>
                            <td>-</td>
                            <td>
                                <button onclick="banStore('${store.id}', ${!store.is_active})"
                                        class="btn btn-sm ${store.is_active ? 'btn-danger' : 'btn-success'}" style="min-height: 32px; font-size: 13px;">
                                    ${store.is_active ? 'Bannir' : 'Debannir'}
                                </button>
                                <button onclick="restrictProducts('${store.id}')"
                                        class="btn btn-sm btn-warning" style="min-height: 32px; font-size: 13px;">
                                    Restreindre
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        }

        window.banStore = async function(storeId, isBanned) {
            if (!await requirePermission('ban_stores')) return;

            try {
                const { error } = await supabase
                    .from('stores')
                    .update({
                        is_active: !isBanned,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', storeId);

                if (error) throw error;
                showSuccess(`Boutique ${isBanned ? 'bannie' : 'débannie'} avec succès`);
                chargerBoutiques();
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        };

        window.restrictProducts = async function(storeId) {
            if (!await requirePermission('restrict_products')) return;
            showInfo('Fonctionnalité de restriction en développement');
        };

        chargerBoutiques();
    </script>
</body>
</html>
