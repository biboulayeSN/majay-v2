<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Boutiques - MAJAY Admin</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .admin-header {
            background: #ffffff;
            color: #37352f;
            border-bottom: 1px solid #e5e5e3;
            padding: 16px;
        }
        .admin-nav a { color: #37352f; }
        .admin-nav a.active { background: #f7f7f5; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }
        table { width: 100%; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; }
        th { background: #f7f7f5; font-weight: 600; color: #37352f; }
    </style>
</head>
<body class="dashboard-page">
    <header class="dashboard-header admin-header">
        <div class="dashboard-header-content">
            <div class="dashboard-logo" style="color: #37352f; font-weight: 700;">ADMIN MAJAY</div>
            <nav class="dashboard-nav admin-nav">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="vendeur.html" class="nav-link">Vendeurs</a>
                <a href="stores.html" class="nav-link active">Boutiques</a>
            </nav>
            <button onclick="deconnexionAdmin()" style="background: none; border: 1px solid #e5e5e3; cursor: pointer; font-size: 0.9em; color: #37352f; padding: 6px 14px; border-radius: 6px;">Deconnexion</button>
        </div>
    </header>

    <div class="dashboard-container">
        <h1 style="font-size: 1.8em; margin-bottom: 24px; color: #37352f; font-weight: 700;">Gestion des Boutiques</h1>
        <div style="background: white; border-radius: 8px; overflow: hidden; border: 1px solid #e5e5e3;">
            <table>
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Proprietaire</th>
                        <th>Plan</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="storesTable">
                    <tr><td colspan="5" style="text-align: center; padding: 40px;">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { adminAuth } from "../js/admin-auth.js";

        const admin = adminAuth.verifierAuthAdmin();
        if (!admin) window.location.href = 'connexion.html';

        window.deconnexionAdmin = () => adminAuth.deconnexionAdmin();

        async function chargerBoutiques() {
            try {
                const stores = await adminAuth.getStores();
                if (stores.length === 0) {
                    document.getElementById('storesTable').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Aucune boutique</td></tr>';
                    return;
                }

                document.getElementById('storesTable').innerHTML = stores.map(store => {
                    const owner = Array.isArray(store.owner) ? store.owner[0] : store.owner;
                    return `
                    <tr>
                        <td>${store.name}</td>
                        <td>${owner?.full_name || 'N/A'}</td>
                        <td>${store.subscription_plan}</td>
                        <td>${store.is_active ? 'Actif' : 'Inactif'}</td>
                        <td>
                            <button onclick="toggleStore('${store.id}', ${!store.is_active})" class="btn-primary" style="padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; min-height: 32px;">
                                ${store.is_active ? 'Desactiver' : 'Activer'}
                            </button>
                        </td>
                    </tr>
                `;
                }).join('');
            } catch (error) {
                console.error(error);
            }
        }

        window.toggleStore = async function(id, isActive) {
            try {
                await adminAuth.toggleStore(id, isActive);
                chargerBoutiques();
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };

        chargerBoutiques();
    </script>
</body>
</html>
