<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abonnements - SAMASTORE Admin</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .admin-header {
            background: #ffffff;
            color: #37352f;
            border-bottom: 1px solid #e5e5e3;
            padding: 16px;
        }
        .admin-nav a { color: #37352f; }
        .admin-nav a.active { background: #f7f7f5; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }
    </style>
</head>
<body class="dashboard-page">
    <header class="dashboard-header admin-header">
        <div class="dashboard-header-content">
            <div class="dashboard-logo" style="color: #37352f; font-weight: 700;">ADMIN SAMASTORE</div>
            <nav class="dashboard-nav admin-nav">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="vendeur.html" class="nav-link">Vendeurs</a>
                <a href="subscriptions.html" class="nav-link active">Abonnements</a>
            </nav>
            <button onclick="deconnexionAdmin()" style="background: none; border: 1px solid #e5e5e3; cursor: pointer; font-size: 0.9em; color: #37352f; padding: 6px 14px; border-radius: 6px;">Deconnexion</button>
        </div>
    </header>

    <div class="dashboard-container">
        <h1 style="font-size: 1.8em; margin-bottom: 24px; color: #37352f; font-weight: 700;">Gestion des Abonnements</h1>
        <div style="background: white; border-radius: 8px; padding: 24px; border: 1px solid #e5e5e3;">
            <p style="color: #6b6b6b; font-size: 14px;">Page en developpement</p>
        </div>
    </div>

    <script type="module">
        import { adminAuth } from "../js/admin-auth.js";

        const admin = adminAuth.verifierAuthAdmin();
        if (!admin) window.location.href = 'connexion.html';

        window.deconnexionAdmin = () => adminAuth.deconnexionAdmin();
    </script>
</body>
</html>
