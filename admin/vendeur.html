<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Vendeurs - MAJAY Admin</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
        }
        .admin-header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .dashboard-logo {
            font-size: 1.3em;
            font-weight: 700;
            color: #37352f;
        }
        .admin-nav {
            display: flex;
            gap: 15px;
        }
        .admin-nav a {
            color: #37352f;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: background 0.2s;
            font-size: 14px;
        }
        .admin-nav a:hover {
            background: #f7f7f5;
        }
        .admin-nav a.active {
            background: #f7f7f5;
            font-weight: 600;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .badge-active {
            background: #d4edda;
            color: #155724;
        }
        .badge-inactive {
            background: #f8d7da;
            color: #721c24;
        }
        .badge-free {
            background: #e3f2fd;
            color: #1565c0;
        }
        .badge-pro {
            background: #fff3e0;
            color: #e65100;
        }
        .badge-online {
            background: #d4edda;
            color: #155724;
        }
        .badge-offline {
            background: #f8d7da;
            color: #721c24;
        }
        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            min-height: 40px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        .btn-danger:hover:not(:disabled) {
            background: #ee5a6f;
        }
        .btn-success {
            background: #2ed573;
            color: white;
        }
        .btn-success:hover:not(:disabled) {
            background: #26de81;
        }
        .btn-logout {
            background: none;
            border: 1px solid #e5e5e3;
            color: #37352f;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.9em;
        }
        .btn-logout:hover {
            background: #f7f7f5;
        }
        select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #e5e5e3;
            background: white;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #2383e2;
        }
        table {
            border-collapse: separate;
            border-spacing: 0;
        }
        tr:hover {
            background: #f7f7f5;
        }
        th {
            font-weight: 600;
            color: #37352f;
        }
        .search-box {
            padding: 10px 16px;
            border: 1px solid #e5e5e3;
            border-radius: 6px;
            width: 300px;
            max-width: 100%;
            font-size: 14px;
        }
        .search-box:focus {
            outline: none;
            border-color: #2383e2;
        }
        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 8px;
            flex: 1;
            min-width: 200px;
            border: 1px solid #e5e5e3;
        }
        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #37352f;
        }
        .stat-label {
            color: #6b6b6b;
            margin-top: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body class="dashboard-page admin-dashboard">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="admin-sidebar-toggle" onclick="toggleAdminSidebar()" aria-label="Toggle sidebar">
        <span id="adminToggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="admin-sidebar-overlay" id="adminSidebarOverlay" onclick="closeAdminSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper admin-wrapper">
        <!-- Sidebar injecté par initAdminNav() -->

        <!-- Main Content -->
        <main class="dashboard-main admin-main">
            <div class="admin-main-content">
                <!-- Page Header -->
                <div class="page-header" style="margin-bottom: 24px;">
                    <h1 class="page-title" style="font-size: 1.8em; font-weight: 700; color: #37352f; margin-bottom: 6px;">
                        Gestion des Vendeurs
                    </h1>
                    <p class="page-subtitle" style="color: #6b6b6b; font-size: 14px;">Surveillance et gestion des boutiques</p>
                </div>

                <!-- Statistiques rapides -->
                <div class="stats-grid" id="statsRow" style="margin-bottom: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <div class="admin-stat-relief" style="border: 1px solid #e5e5e3; border-radius: 8px; padding: 16px;">
                        <div class="stat-label" style="color: #6b6b6b; font-size: 13px;">Total Vendeurs</div>
                        <div class="stat-value" id="totalVendeurs" style="font-size: 1.8em; font-weight: 700; color: #37352f;">-</div>
                    </div>
                    <div class="admin-stat-relief" style="border: 1px solid #e5e5e3; border-radius: 8px; padding: 16px;">
                        <div class="stat-label" style="color: #6b6b6b; font-size: 13px;">Actifs</div>
                        <div class="stat-value" id="vendeursActifs" style="font-size: 1.8em; font-weight: 700; color: #37352f;">-</div>
                    </div>
                    <div class="admin-stat-relief" style="border: 1px solid #e5e5e3; border-radius: 8px; padding: 16px;">
                        <div class="stat-label" style="color: #6b6b6b; font-size: 13px;">Plan Pro</div>
                        <div class="stat-value" id="vendeursPro" style="font-size: 1.8em; font-weight: 700; color: #37352f;">-</div>
                    </div>
                </div>

                <!-- Barre de recherche -->
                <div class="admin-card-relief" style="margin-bottom: 24px; border: 1px solid #e5e5e3; border-radius: 8px;">
                    <input type="text" id="searchInput" class="form-control" placeholder="Rechercher par nom, categorie, localite, telephone..." style="font-size: 14px; padding: 12px 16px; border: none;">
                </div>

                <!-- Tableau des vendeurs -->
                <div class="admin-card-relief" style="padding: 0; overflow: hidden; border: 1px solid #e5e5e3; border-radius: 8px;">
                    <div style="overflow-x: auto;">
                        <table class="admin-table-relief" style="width: 100%; min-width: 1200px; border-collapse: separate; border-spacing: 0;">
                            <thead>
                                <tr style="background: #f7f7f5;">
                                    <th style="color: #37352f;">Identite</th>
                                    <th style="color: #37352f;">Localisation</th>
                                    <th style="color: #37352f;">Contact</th>
                                    <th style="color: #37352f;">Plan</th>
                                    <th style="text-align: center; color: #37352f;">Produits</th>
                                    <th style="text-align: center; color: #37352f;">Disponibilite</th>
                                    <th style="text-align: center; color: #37352f;">Derniere connexion</th>
                                    <th style="text-align: center; color: #37352f;">Statut</th>
                                    <th style="text-align: center; color: #37352f;">Actions</th>
                                </tr>
                            </thead>
                <tbody id="vendeursTable">
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 40px; color: #6b6b6b;">
                            <div style="margin-top: 10px;">Chargement des donnees...</div>
                        </td>
                    </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { adminAuth } from "../js/admin-auth.js";
        import { initAdminApp } from "../js/admin-app.js";
        import { afficherEtatVide } from "../js/admin-utils.js";

        // Initialiser l'app admin (charge le sidebar et le router)
        initAdminApp();

        // Vérifier l'authentification
        const admin = adminAuth.verifierAuthAdmin();
        if (!admin) {
            window.location.href = 'connexion.html';
        }

        let stores = [];
        let stats = { total: 0, actifs: 0, pro: 0 };

        // Charger les boutiques
        async function chargerVendeurs() {
            try {
                stores = await adminAuth.getStores();

                // Enrichir avec le nombre de produits
                for (let store of stores) {
                    const { count } = await supabase
                        .from('products')
                        .select('*', { count: 'exact', head: true })
                        .eq('store_id', store.id)
                        .eq('is_active', true);
                    store.nombreProduits = count || 0;
                }

                calculerStats();
                afficherVendeurs(stores);
            } catch (error) {
                console.error('Erreur chargement:', error);
                document.getElementById('vendeursTable').innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 40px;">
                            <div style="color: #ff4757; font-weight: 600; font-size: 15px; margin-bottom: 8px;">Erreur lors du chargement</div>
                            <div style="color: #6b6b6b; font-size: 13px;">${error.message}</div>
                        </td>
                    </tr>
                `;
            }
        }

        // Calculer les statistiques
        function calculerStats() {
            stats.total = stores.length;
            stats.actifs = stores.filter(s => s.is_active).length;
            stats.pro = stores.filter(s => s.subscription_plan === 'pro' || s.subscription_plan === 'entreprise').length;

            document.getElementById('totalVendeurs').textContent = stats.total;
            document.getElementById('vendeursActifs').textContent = stats.actifs;
            document.getElementById('vendeursPro').textContent = stats.pro;
        }

        // Calculer le statut en ligne/hors ligne basé sur last_login
        function calculerStatutEnLigne(lastLogin) {
            if (!lastLogin) return { isOnline: false, label: 'Hors ligne', badgeClass: 'badge-offline' };

            const maintenant = new Date();
            const derniereConnexion = new Date(lastLogin);
            const diffMinutes = (maintenant - derniereConnexion) / (1000 * 60);

            // En ligne si dernière connexion < 5 minutes
            const isOnline = diffMinutes < 5;

            return {
                isOnline,
                label: isOnline ? 'En ligne' : 'Hors ligne',
                badgeClass: isOnline ? 'badge-online' : 'badge-offline'
            };
        }

        // Formater la date de dernière connexion
        function formaterDerniereConnexion(lastLogin) {
            if (!lastLogin) return 'Jamais';

            const date = new Date(lastLogin);
            const maintenant = new Date();
            const diffMinutes = Math.floor((maintenant - date) / (1000 * 60));

            if (diffMinutes < 1) return 'À l\'instant';
            if (diffMinutes < 60) return `Il y a ${diffMinutes} min`;
            if (diffMinutes < 1440) return `Il y a ${Math.floor(diffMinutes / 60)} h`;

            return date.toLocaleDateString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Afficher les boutiques dans le tableau
        function afficherVendeurs(liste) {
            if (liste.length === 0) {
                document.getElementById('vendeursTable').innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 40px;">
                            ${afficherEtatVide("Aucune boutique trouvée")}
                        </td>
                    </tr>
                `;
                return;
            }

            document.getElementById('vendeursTable').innerHTML = liste.map(store => {
                const owner = Array.isArray(store.owner) ? store.owner[0] : store.owner;
                const statutEnLigne = calculerStatutEnLigne(owner?.last_login);
                const derniereConnexion = formaterDerniereConnexion(owner?.last_login);
                const localisation = [store.city, store.region].filter(Boolean).join(', ') || 'Non renseigne';

                return `
                <tr>
                    <td>
                        <div style="font-weight: 600; color: #37352f; font-size: 14px; margin-bottom: 2px;">${owner?.full_name || store.name}</div>
                        <div style="color: #6b6b6b; font-size: 12px;">
                            ${store.activity_category || 'Non categorise'}
                        </div>
                    </td>
                    <td>
                        <div style="color: #37352f; font-size: 13px; font-weight: 500;">${localisation}</div>
                    </td>
                    <td>
                        <div style="color: #37352f; font-size: 13px; font-weight: 500;">${owner?.phone || 'N/A'}</div>
                        <div style="color: #6b6b6b; font-size: 12px; margin-top: 2px;">@${store.slug}</div>
                    </td>
                    <td>
                        <select onchange="changerPlan('${store.id}', this.value, this)"
                                class="form-control"
                                style="padding: 8px 12px; border-radius: 6px; border: 1px solid #e5e5e3; background: white; font-size: 13px; font-weight: 500; cursor: pointer;">
                            <option value="free" ${store.subscription_plan === 'free' ? 'selected' : ''}>Free</option>
                            <option value="pro" ${store.subscription_plan === 'pro' ? 'selected' : ''}>Pro</option>
                            <option value="entreprise" ${store.subscription_plan === 'entreprise' ? 'selected' : ''}>Entreprise</option>
                        </select>
                    </td>
                    <td style="text-align: center;">
                        <span style="font-weight: 600; color: #2383e2; font-size: 14px;">${store.nombreProduits || 0}</span>
                    </td>
                    <td style="text-align: center;">
                        <span class="badge ${statutEnLigne.badgeClass}" style="padding: 4px 10px; font-size: 12px; font-weight: 600;">
                            ${statutEnLigne.label}
                        </span>
                    </td>
                    <td style="text-align: center; font-size: 12px; color: #6b6b6b;">
                        ${derniereConnexion}
                    </td>
                    <td style="text-align: center;">
                        <span class="badge ${store.is_active ? 'badge-active' : 'badge-inactive'}" style="padding: 4px 10px; font-size: 12px; font-weight: 600;">
                            ${store.is_active ? 'Actif' : 'Inactif'}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <button class="btn ${store.is_active ? 'btn-danger' : 'btn-success'}"
                                onclick="${store.is_active ? 'desactiverVendeur' : 'activerVendeur'}('${store.id}', this)"
                                style="padding: 6px 12px; font-size: 12px; min-height: 32px;">
                            ${store.is_active ? 'Desactiver' : 'Activer'}
                        </button>
                    </td>
                </tr>
            `;
            }).join('');
        }

        // Changer le plan d'une boutique
        window.changerPlan = async (storeId, nouveauPlan, selectElement) => {
            const store = stores.find(s => s.id === storeId);
            const ancienPlan = store?.subscription_plan || 'free';
            selectElement.disabled = true;

            try {
                await adminAuth.changerPlan(storeId, nouveauPlan);
                const planNames = { free: 'Free', pro: 'Pro', entreprise: 'Entreprise' };
                alert(`Plan modifie avec succes vers ${planNames[nouveauPlan] || nouveauPlan} !`);
                await chargerVendeurs();
            } catch (error) {
                alert('Erreur lors de la modification du plan: ' + error.message);
                console.error(error);
                selectElement.value = ancienPlan;
                selectElement.disabled = false;
            }
        };

        // Désactiver une boutique
        window.desactiverVendeur = async (storeId, btnElement) => {
            if (!confirm('Etes-vous sur de vouloir desactiver cette boutique ?\n\nSon catalogue ne sera plus accessible publiquement.')) {
                return;
            }

            btnElement.disabled = true;
            btnElement.textContent = 'Desactivation...';

            try {
                await adminAuth.toggleStore(storeId, false);
                alert('Boutique desactivee avec succes !');
                await chargerVendeurs();
            } catch (error) {
                alert('Erreur lors de la desactivation: ' + error.message);
                console.error(error);
                btnElement.disabled = false;
                btnElement.textContent = 'Desactiver';
            }
        };

        // Activer une boutique
        window.activerVendeur = async (storeId, btnElement) => {
            btnElement.disabled = true;
            btnElement.textContent = 'Activation...';

            try {
                await adminAuth.toggleStore(storeId, true);
                alert('Boutique activee avec succes !');
                await chargerVendeurs();
            } catch (error) {
                alert('Erreur lors de l\'activation: ' + error.message);
                console.error(error);
                btnElement.disabled = false;
                btnElement.textContent = 'Activer';
            }
        };

        // Fonction de recherche
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const terme = e.target.value.toLowerCase().trim();

            if (!terme) {
                afficherVendeurs(stores);
                return;
            }

            const filtres = stores.filter(store => {
                const owner = Array.isArray(store.owner) ? store.owner[0] : store.owner;
                const localisation = [store.city, store.region].filter(Boolean).join(' ').toLowerCase();
                return store.name.toLowerCase().includes(terme) ||
                       store.slug.toLowerCase().includes(terme) ||
                       (store.activity_category && store.activity_category.toLowerCase().includes(terme)) ||
                       localisation.includes(terme) ||
                       (owner?.phone && owner.phone.includes(terme)) ||
                       (owner?.full_name && owner.full_name.toLowerCase().includes(terme));
            });

            afficherVendeurs(filtres);
        });

        // Charger les vendeurs au démarrage
        chargerVendeurs();
    </script>
</body>
</html>
