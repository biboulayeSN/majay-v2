<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Vendeurs - MAJAY Admin</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .admin-header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .dashboard-logo {
            font-size: 1.5em;
            font-weight: bold;
        }
        .admin-nav {
            display: flex;
            gap: 15px;
        }
        .admin-nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .admin-nav a:hover {
            background: rgba(255,255,255,0.1);
        }
        .admin-nav a.active {
            background: rgba(255,255,255,0.2);
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-active {
            background: #d4edda;
            color: #155724;
        }
        .badge-inactive {
            background: #f8d7da;
            color: #721c24;
        }
        .badge-free {
            background: #e3f2fd;
            color: #1565c0;
        }
        .badge-pro {
            background: #fff3e0;
            color: #e65100;
        }
        .badge-online {
            background: #d4edda;
            color: #155724;
        }
        .badge-offline {
            background: #f8d7da;
            color: #721c24;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            font-weight: 500;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        .btn-danger:hover:not(:disabled) {
            background: #ee5a6f;
            transform: translateY(-1px);
        }
        .btn-success {
            background: #2ed573;
            color: white;
        }
        .btn-success:hover:not(:disabled) {
            background: #26de81;
            transform: translateY(-1px);
        }
        .btn-logout {
            background: none;
            border: 2px solid white;
            color: white;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.1);
        }
        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        select:hover {
            border-color: #cbd5e0;
        }
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        table {
            border-collapse: separate;
            border-spacing: 0;
        }
        tr:hover {
            background: #f7fafc;
        }
        th {
            font-weight: 600;
            color: #2d3748;
        }
        .search-box {
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            width: 300px;
            max-width: 100%;
            font-size: 1em;
            transition: all 0.3s;
        }
        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            min-width: 200px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #1a1a2e;
        }
        .stat-label {
            color: #718096;
            margin-top: 5px;
        }
    </style>
</head>
<body class="dashboard-page admin-dashboard">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="admin-sidebar-toggle" onclick="toggleAdminSidebar()" aria-label="Toggle sidebar">
        <span id="adminToggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="admin-sidebar-overlay" id="adminSidebarOverlay" onclick="closeAdminSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper admin-wrapper">
        <!-- Sidebar injecté par initAdminNav() -->
        
        <!-- Main Content -->
        <main class="dashboard-main admin-main">
            <div class="admin-main-content">
                <!-- Page Header -->
                <div class="page-header" style="margin-bottom: 30px;">
                    <h1 class="page-title" style="font-size: 2.5em; font-weight: 900; color: #1a1a2e; margin-bottom: 10px;">
                        Gestion des Vendeurs
                    </h1>
                    <p class="page-subtitle" style="color: #718096; font-size: 1.1em;">Surveillance et gestion des boutiques</p>
                </div>

                <!-- Statistiques rapides -->
                <div class="stats-grid" id="statsRow" style="margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                    <div class="admin-stat-relief">
                        <div class="stat-icon">👥</div>
                        <div class="stat-label">Total Vendeurs</div>
                        <div class="stat-value" id="totalVendeurs">-</div>
                    </div>
                    <div class="admin-stat-relief">
                        <div class="stat-icon">✅</div>
                        <div class="stat-label">Actifs</div>
                        <div class="stat-value" id="vendeursActifs">-</div>
                    </div>
                    <div class="admin-stat-relief">
                        <div class="stat-icon">⭐</div>
                        <div class="stat-label">Plan Pro</div>
                        <div class="stat-value" id="vendeursPro">-</div>
                    </div>
                </div>

                <!-- Barre de recherche -->
                <div class="admin-card-relief" style="margin-bottom: 30px;">
                    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Rechercher par nom, catégorie, localité, téléphone..." style="font-size: 16px; padding: 16px 20px;">
                </div>

                <!-- Tableau des vendeurs -->
                <div class="admin-card-relief" style="padding: 0; overflow: hidden;">
                    <div style="overflow-x: auto;">
                        <table class="admin-table-relief" style="width: 100%; min-width: 1200px; border-collapse: separate; border-spacing: 0;">
                            <thead>
                                <tr>
                                    <th>Identité</th>
                                    <th>Localisation</th>
                                    <th>Contact</th>
                                    <th>Plan</th>
                                    <th style="text-align: center;">Produits</th>
                                    <th style="text-align: center;">Disponibilité</th>
                                    <th style="text-align: center;">Dernière connexion</th>
                                    <th style="text-align: center;">Statut</th>
                                    <th style="text-align: center;">Actions</th>
                                </tr>
                            </thead>
                <tbody id="vendeursTable">
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 60px; color: #718096;">
                            <div style="font-size: 3em;">⏳</div>
                            <div style="margin-top: 10px;">Chargement des données...</div>
                        </td>
                    </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { adminAuth } from "../js/admin-auth.js";
        import { initAdminApp } from "../js/admin-app.js";
        import { afficherEtatVide } from "../js/admin-utils.js";

        // Initialiser l'app admin (charge le sidebar et le router)
        initAdminApp();

        // Vérifier l'authentification
        const admin = adminAuth.verifierAuthAdmin();
        if (!admin) {
            window.location.href = 'connexion.html';
        }

        let stores = [];
        let stats = { total: 0, actifs: 0, pro: 0 };

        // Charger les boutiques
        async function chargerVendeurs() {
            try {
                stores = await adminAuth.getStores();
                
                // Enrichir avec le nombre de produits
                for (let store of stores) {
                    const { count } = await supabase
                        .from('products')
                        .select('*', { count: 'exact', head: true })
                        .eq('store_id', store.id)
                        .eq('is_active', true);
                    store.nombreProduits = count || 0;
                }
                
                calculerStats();
                afficherVendeurs(stores);
            } catch (error) {
                console.error('Erreur chargement:', error);
                document.getElementById('vendeursTable').innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 40px;">
                            <div style="color: #ff4757; font-size: 3em; margin-bottom: 15px;">❌</div>
                            <div style="color: #ff4757; font-weight: 700; font-size: 18px; margin-bottom: 8px;">Erreur lors du chargement</div>
                            <div style="color: #718096; font-size: 14px;">${error.message}</div>
                        </td>
                    </tr>
                `;
            }
        }

        // Calculer les statistiques
        function calculerStats() {
            stats.total = stores.length;
            stats.actifs = stores.filter(s => s.is_active).length;
            stats.pro = stores.filter(s => s.subscription_plan === 'pro' || s.subscription_plan === 'entreprise').length;
            
            document.getElementById('totalVendeurs').textContent = stats.total;
            document.getElementById('vendeursActifs').textContent = stats.actifs;
            document.getElementById('vendeursPro').textContent = stats.pro;
        }

        // Calculer le statut en ligne/hors ligne basé sur last_login
        function calculerStatutEnLigne(lastLogin) {
            if (!lastLogin) return { isOnline: false, label: 'Hors ligne', badgeClass: 'badge-offline' };
            
            const maintenant = new Date();
            const derniereConnexion = new Date(lastLogin);
            const diffMinutes = (maintenant - derniereConnexion) / (1000 * 60);
            
            // En ligne si dernière connexion < 5 minutes
            const isOnline = diffMinutes < 5;
            
            return {
                isOnline,
                label: isOnline ? 'En ligne' : 'Hors ligne',
                badgeClass: isOnline ? 'badge-online' : 'badge-offline'
            };
        }

        // Formater la date de dernière connexion
        function formaterDerniereConnexion(lastLogin) {
            if (!lastLogin) return 'Jamais';
            
            const date = new Date(lastLogin);
            const maintenant = new Date();
            const diffMinutes = Math.floor((maintenant - date) / (1000 * 60));
            
            if (diffMinutes < 1) return 'À l\'instant';
            if (diffMinutes < 60) return `Il y a ${diffMinutes} min`;
            if (diffMinutes < 1440) return `Il y a ${Math.floor(diffMinutes / 60)} h`;
            
            return date.toLocaleDateString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Afficher les boutiques dans le tableau
        function afficherVendeurs(liste) {
            if (liste.length === 0) {
                document.getElementById('vendeursTable').innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 40px;">
                            ${afficherEtatVide("Aucune boutique trouvée", "🔍")}
                        </td>
                    </tr>
                `;
                return;
            }

            document.getElementById('vendeursTable').innerHTML = liste.map(store => {
                const owner = Array.isArray(store.owner) ? store.owner[0] : store.owner;
                const statutEnLigne = calculerStatutEnLigne(owner?.last_login);
                const derniereConnexion = formaterDerniereConnexion(owner?.last_login);
                const localisation = [store.city, store.region].filter(Boolean).join(', ') || 'Non renseigné';
                
                return `
                <tr>
                    <td>
                        <div style="font-weight: 700; color: #2d3748; font-size: 15px; margin-bottom: 4px;">${owner?.full_name || store.name}</div>
                        <div style="color: #718096; font-size: 13px;">
                            ${store.activity_category || 'Non catégorisé'}
                        </div>
                    </td>
                    <td>
                        <div style="color: #2d3748; font-size: 14px; font-weight: 500;">📍 ${localisation}</div>
                    </td>
                    <td>
                        <div style="color: #2d3748; font-size: 14px; font-weight: 500;">${owner?.phone || 'N/A'}</div>
                        <div style="color: #718096; font-size: 12px; margin-top: 4px;">@${store.slug}</div>
                    </td>
                    <td>
                        <select onchange="changerPlan('${store.id}', this.value, this)" 
                                class="form-control" 
                                style="padding: 10px 14px; border-radius: 10px; border: 2px solid #e2e8f0; background: white; font-size: 14px; font-weight: 500; cursor: pointer;">
                            <option value="free" ${store.subscription_plan === 'free' ? 'selected' : ''}>🎁 Free</option>
                            <option value="pro" ${store.subscription_plan === 'pro' ? 'selected' : ''}>⭐ Pro</option>
                            <option value="entreprise" ${store.subscription_plan === 'entreprise' ? 'selected' : ''}>🏢 Entreprise</option>
                        </select>
                    </td>
                    <td style="text-align: center;">
                        <span style="font-weight: 700; color: #667eea; font-size: 16px;">${store.nombreProduits || 0}</span>
                    </td>
                    <td style="text-align: center;">
                        <span class="badge ${statutEnLigne.badgeClass}" style="padding: 8px 14px; font-size: 13px; font-weight: 600;">
                            ${statutEnLigne.isOnline ? '🟢' : '🔴'} ${statutEnLigne.label}
                        </span>
                    </td>
                    <td style="text-align: center; font-size: 13px; color: #718096;">
                        ${derniereConnexion}
                    </td>
                    <td style="text-align: center;">
                        <span class="badge ${store.is_active ? 'badge-active' : 'badge-inactive'}" style="padding: 8px 14px; font-size: 13px; font-weight: 600;">
                            ${store.is_active ? '✓ Actif' : '✗ Inactif'}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <button class="btn ${store.is_active ? 'btn-danger' : 'btn-success'}" 
                                onclick="${store.is_active ? 'desactiverVendeur' : 'activerVendeur'}('${store.id}', this)"
                                style="padding: 10px 16px; font-size: 13px;">
                            ${store.is_active ? '🚫 Désactiver' : '✓ Activer'}
                        </button>
                    </td>
                </tr>
            `;
            }).join('');
        }

        // Changer le plan d'une boutique
        window.changerPlan = async (storeId, nouveauPlan, selectElement) => {
            const store = stores.find(s => s.id === storeId);
            const ancienPlan = store?.subscription_plan || 'free';
            selectElement.disabled = true;
            
            try {
                await adminAuth.changerPlan(storeId, nouveauPlan);
                const planNames = { free: 'Free 🎁', pro: 'Pro ⭐', entreprise: 'Entreprise 🏢' };
                alert(`✅ Plan modifié avec succès vers ${planNames[nouveauPlan] || nouveauPlan} !`);
                await chargerVendeurs();
            } catch (error) {
                alert('❌ Erreur lors de la modification du plan: ' + error.message);
                console.error(error);
                selectElement.value = ancienPlan;
                selectElement.disabled = false;
            }
        };

        // Désactiver une boutique
        window.desactiverVendeur = async (storeId, btnElement) => {
            if (!confirm('⚠️ Êtes-vous sûr de vouloir désactiver cette boutique ?\n\nSon catalogue ne sera plus accessible publiquement.')) {
                return;
            }
            
            btnElement.disabled = true;
            btnElement.textContent = '⏳ Désactivation...';
            
            try {
                await adminAuth.toggleStore(storeId, false);
                alert('✅ Boutique désactivée avec succès !');
                await chargerVendeurs();
            } catch (error) {
                alert('❌ Erreur lors de la désactivation: ' + error.message);
                console.error(error);
                btnElement.disabled = false;
                btnElement.textContent = '🚫 Désactiver';
            }
        };

        // Activer une boutique
        window.activerVendeur = async (storeId, btnElement) => {
            btnElement.disabled = true;
            btnElement.textContent = '⏳ Activation...';
            
            try {
                await adminAuth.toggleStore(storeId, true);
                alert('✅ Boutique activée avec succès !');
                await chargerVendeurs();
            } catch (error) {
                alert('❌ Erreur lors de l\'activation: ' + error.message);
                console.error(error);
                btnElement.disabled = false;
                btnElement.textContent = '✓ Activer';
            }
        };

        // Fonction de recherche
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const terme = e.target.value.toLowerCase().trim();
            
            if (!terme) {
                afficherVendeurs(stores);
                return;
            }
            
            const filtres = stores.filter(store => {
                const owner = Array.isArray(store.owner) ? store.owner[0] : store.owner;
                const localisation = [store.city, store.region].filter(Boolean).join(' ').toLowerCase();
                return store.name.toLowerCase().includes(terme) || 
                       store.slug.toLowerCase().includes(terme) ||
                       (store.activity_category && store.activity_category.toLowerCase().includes(terme)) ||
                       localisation.includes(terme) ||
                       (owner?.phone && owner.phone.includes(terme)) ||
                       (owner?.full_name && owner.full_name.toLowerCase().includes(terme));
            });
            
            afficherVendeurs(filtres);
        });

        // Charger les vendeurs au démarrage
        chargerVendeurs();
    </script>
</body>
</html>
