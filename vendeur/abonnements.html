<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abonnements - MAJAY</title>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="dashboard-page">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🛍️ MA-JAY</div>
            </div>
            
            <nav class="sidebar-nav" id="mainNav">
                <a href="dashboard.html" class="sidebar-nav-link">📊 Dashboard</a>
                <a href="produits.html" class="sidebar-nav-link">📦 Produits</a>
                <a href="commandes.html" class="sidebar-nav-link">🛒 Commandes</a>
                <a href="clients.html" class="sidebar-nav-link">👥 Clients</a>
                <a href="analytics.html" class="sidebar-nav-link">📈 Analytics</a>
                <a href="abonnements.html" class="sidebar-nav-link active">💳 Abonnements</a>
                <a href="profil.html" class="sidebar-nav-link">⚙️ Profil</a>
            </nav>

            <div class="sidebar-footer">
                <a href="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan" title="Gérer mon abonnement" aria-label="Plan actuel">FREE</a>
                <button onclick="window.authMaJay.deconnexion()" class="btn btn-outline btn-sm w-full" title="Déconnexion" aria-label="Se déconnecter">🚪 Déconnexion</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-main-content">
        <div class="page-header">
            <h1 class="page-title">Mon Abonnement</h1>
        </div>

        <div class="plan-card" id="currentPlan">
            <div class="loader"></div>
        </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { subscriptionsUtils } from "../js/subscriptions.js";
        import { authMaJay } from "../js/auth.js";
        import { ADMIN_PHONE } from "../js/config.js";

        const session = authMaJay.getSession();
        if (!session) window.location.href = 'connexion.html';

        // Sidebar toggle functions
        function toggleSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            
            if (isOpen) {
                closeSidebar();
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('active');
                document.getElementById('toggleIcon').textContent = '✕';
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.getElementById('toggleIcon').textContent = '☰';
        }

        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;

        // Mettre à jour le badge du plan dans la sidebar
        const userPlan = document.getElementById('userPlan');
        if (userPlan) {
            userPlan.textContent = (session.subscription_plan || 'free').toUpperCase();
            userPlan.className = `sidebar-plan-badge badge-${session.subscription_plan || 'free'}`;
        }

        // Afficher les liens conditionnels selon le plan
        const plan = session.subscription_plan || 'free';
        if (plan === 'entreprise') {
            const nav = document.getElementById('mainNav');
            const equipeLink = document.createElement('a');
            equipeLink.href = 'equipe.html';
            equipeLink.className = 'sidebar-nav-link';
            equipeLink.textContent = '👥 Équipe';
            nav.insertBefore(equipeLink, nav.lastElementChild);
            
            const multiLink = document.createElement('a');
            multiLink.href = 'multi-boutiques.html';
            multiLink.className = 'sidebar-nav-link';
            multiLink.textContent = '🏪 Multi-Boutiques';
            nav.insertBefore(multiLink, nav.lastElementChild);
        }

        async function chargerPlan() {
            try {
                const result = await subscriptionsUtils.getCurrentPlan();
                if (!result.success) {
                    throw new Error(result.error);
                }

                const plan = result.data;
                const planDetails = plan.plan_details;
                const planNames = { free: '🎁 FREE', pro: '⭐ PRO', entreprise: '🏢 ENTREPRISE' };

                document.getElementById('currentPlan').innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h2 class="text-2xl font-black text-text mb-4">Plan actuel: ${planNames[plan.plan_name] || plan.plan_name}</h2>
                        </div>
                        <div class="card-body">
                            <div class="mb-4">
                                <p class="text-base mb-2"><strong class="font-semibold">Prix:</strong> <span class="text-text">${planDetails?.annual_price ? (planDetails.annual_price / 1000).toLocaleString() + ' FCFA/an' : 'Gratuit'}</span></p>
                                <p class="text-base mb-2"><strong class="font-semibold">Produits max:</strong> <span class="text-text">${planDetails?.max_products === -1 ? 'Illimité' : planDetails?.max_products}</span></p>
                                ${plan.expires_at ? `<p class="text-base"><strong class="font-semibold">Expire le:</strong> <span class="text-text">${new Date(plan.expires_at).toLocaleDateString('fr-FR')}</span></p>` : ''}
                            </div>
                            <button onclick="upgradePlan()" class="btn btn-primary btn-lg w-full mt-6" aria-label="Passer au plan supérieur">🚀 Passer au plan supérieur</button>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
            }
        }

        window.upgradePlan = function() {
            const msg = `Bonjour, je souhaite passer au plan supérieur.\n\nBoutique: ${session.store_name}\nTéléphone: ${session.phone}`;
            window.open(`https://wa.me/${ADMIN_PHONE.replace(/\+/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        chargerPlan();
    </script>
</body>
</html>
