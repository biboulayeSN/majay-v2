<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abonnements - SAMASTORE</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="dashboard-page">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SAMASTORE</div>
            </div>

            <nav class="sidebar-nav" id="mainNav">
                <a href="dashboard.html" class="sidebar-nav-link">Dashboard</a>
                <a href="produits.html" class="sidebar-nav-link">Produits</a>
                <a href="commandes.html" class="sidebar-nav-link">Commandes</a>
                <a href="clients.html" class="sidebar-nav-link">Clients</a>
                <a href="analytics.html" class="sidebar-nav-link">Analytics</a>
                <a href="abonnements.html" class="sidebar-nav-link active">Abonnements</a>
                <a href="profil.html" class="sidebar-nav-link">Profil</a>
            </nav>

            <div class="sidebar-footer">
                <a href="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan" title="Gérer mon abonnement" aria-label="Plan actuel">FREE</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-main-content">
        <!-- Section hero -->
        <div style="text-align: center; padding: 2rem 1rem; margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #37352f;">Choisissez votre Plan</h1>
            <p style="font-size: 1rem; color: #718096;">Optez pour le plan qui correspond le mieux a vos besoins</p>
        </div>

        <!-- Plans cards grid -->
        <div class="pricing-grid" id="plansGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 3rem;">
            <div class="loader"></div>
        </div>

        <!-- Section fonctionnalités détaillées -->
        <div class="features-section">
            <h2 style="text-align: center; font-size: 1.25rem; font-weight: 700; margin-bottom: 2rem; color: #37352f;">Fonctionnalités</h2>

            <div class="features-comparison" style="overflow-x: auto;">
                <table class="features-table" style="width: 100%; border-collapse: collapse;" id="featuresTable">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--color-border, #e2e8f0);">
                            <th style="text-align: left; padding: 1rem;">Fonctionnalité</th>
                            <th style="text-align: center; padding: 1rem;">FREE</th>
                            <th style="text-align: center; padding: 1rem;">PRO</th>
                            <th style="text-align: center; padding: 1rem;">ENTREPRISE</th>
                        </tr>
                    </thead>
                    <tbody id="featuresTableBody">
                        <!-- Fonctionnalités chargées dynamiquement -->
                    </tbody>
                </table>
            </div>
        </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { subscriptionsUtils } from "../js/subscriptions.js";
        import { authSAMASTORE } from "../js/auth.js";
        import { ADMIN_PHONE } from "../js/config.js";

        const session = authSAMASTORE.getSession();
        if (!session) window.location.href = 'connexion.html';

        // Sidebar toggle functions
        function toggleSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');

            if (isOpen) {
                closeSidebar();
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('active');
                document.getElementById('toggleIcon').textContent = '✕';
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.getElementById('toggleIcon').textContent = '☰';
        }

        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;

        // Mettre à jour le badge du plan dans la sidebar
        const userPlan = document.getElementById('userPlan');
        if (userPlan) {
            userPlan.textContent = (session.subscription_plan || 'free').toUpperCase();
            userPlan.className = `sidebar-plan-badge badge-${session.subscription_plan || 'free'}`;
        }

        // Afficher les liens conditionnels selon le plan
        const plan = session.subscription_plan || 'free';
        if (plan === 'entreprise') {
            const nav = document.getElementById('mainNav');
            const equipeLink = document.createElement('a');
            equipeLink.href = 'equipe.html';
            equipeLink.className = 'sidebar-nav-link';
            equipeLink.textContent = 'Equipe';
            nav.insertBefore(equipeLink, nav.lastElementChild);

            const multiLink = document.createElement('a');
            multiLink.href = 'multi-boutiques.html';
            multiLink.className = 'sidebar-nav-link';
            multiLink.textContent = 'Multi-Boutiques';
            nav.insertBefore(multiLink, nav.lastElementChild);
        }

        async function chargerPlans() {
            try {
                const [currentPlanResult, allPlansResult] = await Promise.all([
                    subscriptionsUtils.getCurrentPlan(),
                    subscriptionsUtils.getAllPlans()
                ]);

                if (!currentPlanResult.success || !allPlansResult.success) {
                    throw new Error('Erreur lors du chargement des plans');
                }

                const currentPlan = currentPlanResult.data;
                const allPlans = allPlansResult.data;
                const currentPlanName = currentPlan.plan_name || 'free';

                // Afficher les cartes de plans
                document.getElementById('plansGrid').innerHTML = allPlans.map(plan => {
                    const isCurrent = plan.name === currentPlanName;
                    const features = plan.features || {};

                    return `
                        <div style="background: white; border-radius: 12px; padding: 2rem; position: relative; border: 1px solid ${isCurrent ? '#2383e2' : '#e2e8f0'};">
                            ${isCurrent ? '<div style="position: absolute; top: 1rem; right: 1rem; background: #2383e2; color: white; padding: 0.25rem 0.75rem; border-radius: 6px; font-weight: 600; font-size: 0.85em;">Plan Actuel</div>' : ''}
                            <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; color: #37352f;">
                                ${plan.name.toUpperCase()}
                            </h3>
                            <div style="font-size: 1.5rem; font-weight: 700; color: #2383e2; margin-bottom: 1rem;">
                                ${plan.annual_price === 0 ? 'Gratuit' : `${(plan.annual_price / 1000).toLocaleString()} FCFA/an`}
                            </div>
                            <ul style="list-style: none; padding: 0; margin: 1.5rem 0;">
                                <li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;">
                                    <span style="color: #2383e2; font-weight: bold;">✓</span>
                                    ${plan.max_products === -1 ? 'Produits illimités' : `${plan.max_products} produits max`}
                                </li>
                                <li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;">
                                    <span style="color: #2383e2; font-weight: bold;">✓</span>
                                    ${plan.max_photos_per_product} photos/produit
                                </li>
                                ${features.whatsapp ? '<li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;"><span style="color: #2383e2; font-weight: bold;">✓</span> Intégration WhatsApp</li>' : ''}
                                ${features.crm ? '<li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;"><span style="color: #2383e2; font-weight: bold;">✓</span> CRM Clients</li>' : ''}
                                ${features.relance ? '<li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;"><span style="color: #2383e2; font-weight: bold;">✓</span> Relance automatique</li>' : ''}
                                ${features.multi_store ? `<li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;"><span style="color: #2383e2; font-weight: bold;">✓</span> ${plan.max_stores} boutiques</li>` : ''}
                                ${features.trend_radar ? '<li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;"><span style="color: #2383e2; font-weight: bold;">✓</span> Trend Radar</li>' : ''}
                                ${features.geo_analytics ? '<li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;"><span style="color: #2383e2; font-weight: bold;">✓</span> Analytics géographiques</li>' : ''}
                            </ul>
                            <button class="btn btn-primary w-full ${isCurrent ? 'disabled' : ''}"
                                    onclick="upgradeToPlan('${plan.name}')"
                                    ${isCurrent ? 'disabled style="opacity: 0.6; cursor: not-allowed; min-height: 40px;"' : 'style="min-height: 40px;"'}>
                                ${isCurrent ? 'Plan actuel' : plan.annual_price === 0 ? 'Gratuit' : 'Choisir ce plan'}
                            </button>
                        </div>
                    `;
                }).join('');

                // Afficher la comparaison des fonctionnalités
                afficherComparaisonFonctionnalites(allPlans, currentPlanName);
            } catch (error) {
                console.error(error);
                document.getElementById('plansGrid').innerHTML = `<div class="text-center p-8 text-danger">Erreur lors du chargement des plans</div>`;
            }
        }

        function afficherComparaisonFonctionnalites(plans, currentPlanName) {
            const featuresList = [
                { name: 'Produits maximum', free: '7', pro: 'Illimité', entreprise: 'Illimité' },
                { name: 'Photos par produit', free: '3', pro: '10', entreprise: '20' },
                { name: 'Boutiques', free: '1', pro: '1', entreprise: '5' },
                { name: 'Agents/Membres équipe', free: '1', pro: '1', entreprise: 'Illimité' },
                { name: 'Intégration WhatsApp', free: '✓', pro: '✓', entreprise: '✓' },
                { name: 'CRM Clients', free: '✗', pro: '✓', entreprise: '✓' },
                { name: 'Relance automatique', free: '✗', pro: '✓', entreprise: '✓' },
                { name: 'Multi-boutiques', free: '✗', pro: '✗', entreprise: '✓' },
                { name: 'Trend Radar', free: '✗', pro: '✗', entreprise: '✓' },
                { name: 'Analytics géographiques', free: '✗', pro: '✗', entreprise: '✓' },
                { name: 'Support', free: 'Email uniquement', pro: 'WhatsApp ou Email', entreprise: 'WhatsApp ou Email' }
            ];

            document.getElementById('featuresTableBody').innerHTML = featuresList.map(feature => `
                <tr style="border-bottom: 1px solid var(--color-border, #e2e8f0);">
                    <td style="padding: 1rem; font-weight: 600;">${feature.name}</td>
                    <td style="padding: 1rem; text-align: center;">${feature.free}</td>
                    <td style="padding: 1rem; text-align: center;">${feature.pro}</td>
                    <td style="padding: 1rem; text-align: center;">${feature.entreprise}</td>
                </tr>
            `).join('');
        }

        window.upgradeToPlan = function(planName) {
            const msg = `Bonjour, je souhaite passer au plan ${planName.toUpperCase()}.\n\nBoutique: ${session.store_name}\nTéléphone: ${session.phone}`;
            window.open(`https://wa.me/${ADMIN_PHONE.replace(/\+/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.upgradePlan = function() {
            const msg = `Bonjour, je souhaite passer au plan supérieur.\n\nBoutique: ${session.store_name}\nTéléphone: ${session.phone}`;
            window.open(`https://wa.me/${ADMIN_PHONE.replace(/\+/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        chargerPlans();
    </script>
</body>
</html>
