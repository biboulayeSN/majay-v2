<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - MAJAY</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .dashboard-page { background: #f7fafc; }
        .dashboard-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .dashboard-header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dashboard-logo { font-size: 1.5em; font-weight: 900; color: #667eea; }
        .dashboard-nav { display: flex; gap: 20px; }
        .nav-link {
            color: #718096;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 15px;
            border-radius: 8px;
        }
        .nav-link.active { background: #edf2f7; color: #667eea; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-icon { font-size: 2.5em; margin-bottom: 10px; }
        .stat-label { color: #718096; font-size: 0.9em; margin-bottom: 8px; }
        .stat-value { font-size: 2em; font-weight: 800; color: #2d3748; }
    </style>
</head>
<body class="dashboard-page">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🛍️ MA-JAY</div>
            </div>
            
            <nav class="sidebar-nav" id="mainNav">
                <a href="dashboard.html" class="sidebar-nav-link">📊 Dashboard</a>
                <a href="produits.html" class="sidebar-nav-link">📦 Produits</a>
                <a href="commandes.html" class="sidebar-nav-link">🛒 Commandes</a>
                <a href="clients.html" class="sidebar-nav-link">👥 Clients</a>
                <a href="analytics.html" class="sidebar-nav-link active">📈 Analytics</a>
                <a href="abonnements.html" class="sidebar-nav-link">💳 Abonnements</a>
                <a href="profil.html" class="sidebar-nav-link">⚙️ Profil</a>
            </nav>

            <div class="sidebar-footer">
                <a href="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan" title="Gérer mon abonnement" aria-label="Plan actuel">FREE</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-main-content">
        <h1 style="font-size: 2em; margin-bottom: 30px;">Analytics</h1>

        <div class="stats-grid" id="statsGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                <div class="loader"></div>
                <p style="margin-top: 15px; color: #718096;">Chargement...</p>
            </div>
        </div>

        <!-- Liste détaillée des produits -->
        <div class="card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h2 class="card-title">📊 Détails des Produits</h2>
                    <p class="card-subtitle">Performance détaillée de chaque produit</p>
                </div>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
                    <select id="filterCategory" class="form-control" style="min-width: 150px;">
                        <option value="">Toutes les catégories</option>
                    </select>
                    <button onclick="exporterCSV()" class="btn btn-primary btn-sm">
                        📥 Exporter CSV
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table class="table" id="productsTable">
                        <thead>
                            <tr>
                                <th>Produit</th>
                                <th>Catégorie</th>
                                <th>Consultations</th>
                                <th>Quantités commandées</th>
                                <th>Quantités restantes</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr>
                                <td colspan="6" class="text-center p-8">
                                    <div class="loader"></div>
                                    <p class="mt-4 text-text-light">Chargement des produits...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
            </div>

    <script type="module">
        import { analyticsUtils } from "../js/analytics.js";
        import { authMaJay } from "../js/auth.js";
        import { supabase } from "../js/config.js";

        const session = authMaJay.getSession();
        if (!session) window.location.href = 'connexion.html';

        // Sidebar toggle functions
        function toggleSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            
            if (isOpen) {
                closeSidebar();
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('active');
                document.getElementById('toggleIcon').textContent = '✕';
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.getElementById('toggleIcon').textContent = '☰';
        }

        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;

        // Mettre à jour le badge du plan dans la sidebar
        const userPlan = document.getElementById('userPlan');
        if (userPlan) {
            userPlan.textContent = (session.subscription_plan || 'free').toUpperCase();
            userPlan.className = `sidebar-plan-badge badge-${session.subscription_plan || 'free'}`;
        }

        // Afficher les liens conditionnels selon le plan
        const plan = session.subscription_plan || 'free';
        if (plan === 'entreprise') {
            const nav = document.getElementById('mainNav');
            const equipeLink = document.createElement('a');
            equipeLink.href = 'equipe.html';
            equipeLink.className = 'sidebar-nav-link';
            equipeLink.textContent = '👥 Équipe';
            nav.insertBefore(equipeLink, nav.lastElementChild);
            
            const multiLink = document.createElement('a');
            multiLink.href = 'multi-boutiques.html';
            multiLink.className = 'sidebar-nav-link';
            multiLink.textContent = '🏪 Multi-Boutiques';
            nav.insertBefore(multiLink, nav.lastElementChild);
        }

        async function chargerStats() {
            try {
                const result = await analyticsUtils.getStoreStats();
                if (!result.success) {
                    throw new Error(result.error);
                }

                const stats = result.data;
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-icon">🛒</div>
                        <div class="stat-label">Commandes</div>
                        <div class="stat-value">${stats.total_orders}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-label">Revenus</div>
                        <div class="stat-value">${stats.total_revenue.toLocaleString()} XOF</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">👁️</div>
                        <div class="stat-label">Vues</div>
                        <div class="stat-value">${stats.total_views}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🛒</div>
                        <div class="stat-label">Ajouts panier</div>
                        <div class="stat-value">${stats.total_cart_adds}</div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
            }
        }

        let productsData = [];
        let filteredProductsData = [];

        async function chargerProduitsDetails() {
            try {
                const { data: products, error: productsError } = await supabase
                    .from('products')
                    .select('id, name, category, stock, views_count, orders_count')
                    .eq('store_id', session.store_id)
                    .eq('is_active', true)
                    .order('created_at', { ascending: false });

                if (productsError) throw productsError;

                // Récupérer les vues depuis click_events
                const { data: viewsData } = await supabase
                    .from('click_events')
                    .select('product_id')
                    .eq('store_id', session.store_id)
                    .eq('event_type', 'view');

                // Récupérer les quantités commandées depuis orders
                const { data: ordersData } = await supabase
                    .from('orders')
                    .select('items')
                    .eq('store_id', session.store_id);

                // Calculer les statistiques par produit
                productsData = products.map(product => {
                    const views = viewsData?.filter(v => v.product_id === product.id).length || product.views_count || 0;
                    
                    // Calculer quantités commandées depuis les commandes
                    let quantitesCommandees = 0;
                    if (ordersData) {
                        ordersData.forEach(order => {
                            if (Array.isArray(order.items)) {
                                const item = order.items.find(i => i.product_id === product.id);
                                if (item) {
                                    quantitesCommandees += parseInt(item.quantity || 0);
                                }
                            }
                        });
                    }

                    return {
                        ...product,
                        consultations: views,
                        quantites_commandees: quantitesCommandees,
                        quantites_restantes: product.stock || 0
                    };
                });

                filteredProductsData = [...productsData];
                afficherTableProduits(filteredProductsData);
                chargerCategories(productsData);
            } catch (error) {
                console.error(error);
                document.getElementById('productsTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center p-8 text-danger">
                            Erreur lors du chargement des produits
                        </td>
                    </tr>
                `;
            }
        }

        function afficherTableProduits(produits) {
            const tbody = document.getElementById('productsTableBody');
            
            if (!produits || produits.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center p-8">
                            <p>Aucun produit trouvé</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = produits.map(p => `
                <tr style="cursor: pointer;" onclick="voirDetailsProduit('${p.id}')" onmouseover="this.style.backgroundColor='#f7fafc'" onmouseout="this.style.backgroundColor=''">
                    <td><strong>${p.name}</strong></td>
                    <td><span class="badge badge-info">${p.category || 'Sans catégorie'}</span></td>
                    <td>${p.consultations}</td>
                    <td>${p.quantites_commandees}</td>
                    <td>${p.quantites_restantes}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); voirDetailsProduit('${p.id}')">
                            👁️ Voir détails
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function chargerCategories(produits) {
            const categories = [...new Set(produits.map(p => p.category).filter(Boolean))];
            const select = document.getElementById('filterCategory');
            select.innerHTML = '<option value="">Toutes les catégories</option>' + 
                categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
            
            select.addEventListener('change', function() {
                const category = this.value;
                filteredProductsData = category ? productsData.filter(p => p.category === category) : [...productsData];
                afficherTableProduits(filteredProductsData);
            });
        }

        window.exporterCSV = async function() {
            const headers = ['Produit', 'Catégorie', 'Consultations', 'Quantités commandées', 'Quantités restantes'];
            const rows = filteredProductsData.map(p => [
                p.name,
                p.category || '',
                p.consultations,
                p.quantites_commandees,
                p.quantites_restantes
            ]);
            
            const csv = [
                headers.join(','),
                ...rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
            ].join('\n');
            
            try {
                const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `produits-analytics-${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                const { showSuccess } = await import('../js/notifications.js');
                showSuccess('Export CSV réussi !');
            } catch (err) {
                const { showError } = await import('../js/notifications.js');
                showError('Erreur lors de l\'export CSV');
            }
        };

        window.voirDetailsProduit = function(productId) {
            window.location.href = `produit-details.html?product_id=${productId}`;
        };

        chargerStats();
        chargerProduitsDetails();
    </script>
            </div>
        </main>
    </div>
</body>
</html>
