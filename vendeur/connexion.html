<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SAMASTORE</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/output.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="logo">SAMASTORE</h1>
            <p class="tagline">Gerez votre boutique en ligne</p>
        </div>

        <div class="auth-card">
            <h2>Connexion Vendeur</h2>
            <p class="auth-subtitle">Gerez votre boutique</p>

            <!-- Etape 1 : Entrer le telephone -->
            <form id="connexionForm" class="auth-form" style="display: block;">
                <div class="form-group">
                    <label for="telephone" class="form-label">Numero de telephone</label>
                    <div class="input-with-prefix">
                        <span class="prefix" id="phonePrefix" aria-hidden="true"></span>
                        <input type="tel" id="telephone" class="form-control" required placeholder="77 123 45 67"
                            aria-required="true" aria-label="Numero de telephone" aria-describedby="telHint">
                    </div>
                    <span class="form-hint" id="telHint">Le prefixe est detecte automatiquement selon votre pays</span>
                </div>

                <button type="submit" class="btn btn-primary w-full" id="btnSubmit"
                    style="min-height: 40px;">
                    <span class="btn-text">Envoyer le code</span>
                    <span class="btn-loader" style="display:none">...</span>
                </button>
            </form>

            <!-- Etape 2 : Entrer le code OTP -->
            <form id="otpForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="otpCode" class="form-label">Code de verification</label>
                    <input type="text" id="otpCode" class="form-control" required placeholder="123456" maxlength="6"
                        pattern="[0-9]{6}" aria-required="true" aria-label="Code de verification"
                        aria-describedby="otpHint">
                    <span class="form-hint" id="otpHint">Entrez le code recu par SMS</span>
                </div>

                <button type="submit" class="btn btn-primary w-full" id="btnVerify"
                    style="min-height: 40px;">
                    <span class="btn-text">Verifier</span>
                    <span class="btn-loader" style="display:none">...</span>
                </button>

                <button type="button" class="btn btn-secondary w-full mt-3" onclick="retourTelephone()">
                    Retour
                </button>
            </form>

            <div class="auth-footer mt-4">
                <p>Pas de boutique ? <a href="inscription.html">Creer maintenant</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { authSAMASTORE } from "../js/auth.js";
        import { detectUserLocation } from "../js/geolocation.js";

        let userLocation = null;

        (async function initGeolocation() {
            try {
                userLocation = await detectUserLocation();

                const phonePrefix = document.getElementById('phonePrefix');
                if (phonePrefix && userLocation) {
                    phonePrefix.textContent = userLocation.prefix;
                }

                const phoneInput = document.getElementById('telephone');
                if (phoneInput) {
                    phoneInput.placeholder = 'Ex: 77 123 45 67';
                }

                const telHint = document.getElementById('telHint');
                if (telHint && userLocation) {
                    telHint.innerHTML = `<span style="color: #4daa57;">&#10003;</span> Pays detecte: ${userLocation.flag} ${userLocation.countryName}`;
                }
            } catch (error) {
                console.error('Erreur initialisation geolocalisation:', error);
            }
        })();

        let phoneNumber = '';

        document.getElementById("connexionForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.btn-loader').style.display = 'inline';

            phoneNumber = document.getElementById("telephone").value.trim();

            const phonePrefix = document.getElementById('phonePrefix');
            const prefix = phonePrefix ? phonePrefix.textContent.trim() : (userLocation?.prefix || '+221');

            if (phoneNumber && !phoneNumber.startsWith('+')) {
                phoneNumber = prefix + phoneNumber.replace(/^0+/, '');
            }

            const result = await authSAMASTORE.connexionVendeur(phoneNumber);

            btn.disabled = false;
            btn.querySelector('.btn-text').style.display = 'inline';
            btn.querySelector('.btn-loader').style.display = 'none';

            if (!result.success) {
                const { showError } = await import("../js/notifications.js");
                showError(result.error);
                return;
            }

            if (result.bypassOTP) {
                const { showSuccess } = await import("../js/notifications.js");
                showSuccess("Connexion directe reussie ! Redirection...");
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
                return;
            }

            const { showSuccess } = await import("../js/notifications.js");
            showSuccess("Code envoye ! Verifiez votre telephone.");

            document.getElementById("connexionForm").style.display = 'none';
            document.getElementById("otpForm").style.display = 'block';
            document.getElementById("otpCode").focus();
        });

        document.getElementById("otpForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const btn = document.getElementById("btnVerify");
            btn.disabled = true;
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.btn-loader').style.display = 'inline';

            const code = document.getElementById("otpCode").value.trim();

            const result = await authSAMASTORE.verifierConnexion(code);

            btn.disabled = false;
            btn.querySelector('.btn-text').style.display = 'inline';
            btn.querySelector('.btn-loader').style.display = 'none';

            if (!result.success) {
                const { showError } = await import("../js/notifications.js");
                showError(result.error);
                return;
            }

            const { showSuccess } = await import("../js/notifications.js");
            showSuccess("Connexion reussie ! Redirection...");
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        });

        window.retourTelephone = function () {
            document.getElementById("connexionForm").style.display = 'block';
            document.getElementById("otpForm").style.display = 'none';
            document.getElementById("otpCode").value = '';
        };
    </script>
</body>

</html>
