<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SAMASTORE</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="dashboard-page">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🛍️ SAMASTORE</div>
            </div>
            
            <nav class="sidebar-nav" id="mainNav">
                <!-- Le sidebar sera injecté par initSidebar() -->
            </nav>

            <div class="sidebar-footer">
                <a href="#" data-route="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan" title="Gérer mon abonnement" aria-label="Plan actuel">FREE</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">TABLEAU DE BORD - <span id="userName">Vendeur</span> 👋</h1>
                <p class="page-subtitle">Voici un aperçu de votre activité</p>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: var(--spacing-2xl);" class="fade-in">
                <div class="loader"></div>
                <p style="margin-top: var(--spacing-md); color: var(--color-text-light);">Chargement des statistiques...</p>
            </div>
        </div>

        <div class="actions-grid">
            <a href="#" data-route="produits.html" class="action-card" role="button" aria-label="Gérer mes produits">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-lg font-bold text-text mb-2">Gérer mes produits</h3>
                        <p class="text-text-light text-base">Ajouter, modifier ou supprimer</p>
                    </div>
                    <div class="text-5xl">📦</div>
                </div>
            </a>

            <button type="button" onclick="copierLien()" class="action-card" aria-label="Partager ma boutique">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-lg font-bold text-text mb-2">Partager ma boutique</h3>
                        <p class="text-text-light text-base">Copier le lien</p>
                    </div>
                    <div class="text-5xl">🔗</div>
                </div>
            </button>

            <a href="#" data-route="commandes.html" class="action-card" role="button" aria-label="Mes commandes">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-lg font-bold text-text mb-2">Mes commandes</h3>
                        <p class="text-text-light text-base">Historique et suivi</p>
                    </div>
                    <div class="text-5xl">🛒</div>
                </div>
            </a>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>📈 Commandes récentes</h2>
            </div>
            <div class="card-body" id="commandesRecentes">
                <div class="empty-state">
                    <div class="loader"></div>
                    <p style="margin-top: var(--spacing-md);">Chargement...</p>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>

    <!-- Initialiser le sidebar et le router -->
    <script type="module">
        import { initVendorApp } from "../js/vendor-app.js";
        initVendorApp();
    </script>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { authSAMASTORE } from "../js/auth.js";

        const session = authSAMASTORE.getSession();
        if (!session) window.location.href = 'connexion.html';
        
        window.upgradePlan = function(plan) {
            const msg = `
Bonjour,
Je souhaite passer au plan ${plan.toUpperCase()}.

Boutique : ${session.store_name}
Téléphone : ${session.phone}
Slug : ${session.store_slug}
`;
            window.open(
                "https://wa.me/221771234567?text=" + encodeURIComponent(msg),
                "_blank"
            );
        };

        document.getElementById('userName').textContent = session.store_name || session.full_name;

        async function chargerStats() {
            // Afficher la barre de chargement pendant 5 secondes minimum
            const startTime = Date.now();
            const minLoadTime = 5000; // 5 secondes
            
            // Afficher la barre de progression
            document.getElementById('statsGrid').innerHTML = `
                <div style="grid-column: 1/-1; padding: var(--spacing-2xl); text-align: center;">
                    <div class="loading-progress">
                        <div class="loading-progress-bar"></div>
                    </div>
                    <p style="margin-top: var(--spacing-md); color: var(--color-text-light); font-size: var(--font-size-base);">Chargement des statistiques...</p>
                </div>
            `;

            try {
                // Lancer les requêtes en parallèle
                const [produitsResult, commandesResult, vuesResult] = await Promise.all([
                    supabase
                        .from('products')
                        .select('id')
                        .eq('store_id', session.store_id)
                        .eq('is_active', true),
                    supabase
                        .from('orders')
                        .select('total')
                        .eq('store_id', session.store_id),
                    supabase
                        .from('click_events')
                        .select('*', { count: 'exact', head: true })
                        .eq('store_id', session.store_id)
                        .eq('event_type', 'view')
                ]);

                const produits = produitsResult.data || [];
                const commandes = commandesResult.data || [];
                const totalVues = vuesResult.count || 0;

                const nbProduits = produits.length || 0;
                const nbCommandes = commandes.length || 0;
                const totalVentes = commandes.reduce((sum, c) => sum + (parseInt(c.total) || 0), 0) || 0;

                // Calculer le temps écoulé et attendre si nécessaire pour atteindre 5 secondes
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(0, minLoadTime - elapsedTime);
                
                if (remainingTime > 0) {
                    await new Promise(resolve => setTimeout(resolve, remainingTime));
                }

                // Vérifier si toutes les stats sont à zéro
                const allStatsZero = nbProduits === 0 && nbCommandes === 0 && totalVentes === 0 && totalVues === 0;

                if (allStatsZero) {
                    document.getElementById('statsGrid').innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: var(--spacing-3xl);" class="fade-in">
                            <div style="font-size: 4rem; margin-bottom: var(--spacing-md);">📊</div>
                            <h3 style="font-size: var(--font-size-xl); font-weight: 700; color: var(--color-text); margin-bottom: var(--spacing-sm);">Aucune transaction enregistrée</h3>
                            <p style="color: var(--color-text-light); font-size: var(--font-size-base);">Vos statistiques apparaîtront ici une fois que vous aurez des produits et des commandes.</p>
                        </div>
                    `;
                } else {
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card slide-up" style="animation-delay: 0.1s;">
                            <div class="stat-icon">📦</div>
                            <div class="stat-label">Produits actifs</div>
                            <div class="stat-value">${nbProduits}</div>
                        </div>
                        <div class="stat-card slide-up" style="animation-delay: 0.2s;">
                            <div class="stat-icon">🛒</div>
                            <div class="stat-label">Commandes</div>
                            <div class="stat-value">${nbCommandes}</div>
                        </div>
                        <div class="stat-card slide-up" style="animation-delay: 0.3s;">
                            <div class="stat-icon">💰</div>
                            <div class="stat-label">Ventes totales</div>
                            <div class="stat-value">${totalVentes.toLocaleString()}</div>
                            <div style="font-size: var(--font-size-sm); color: var(--color-text-light); margin-top: var(--spacing-xs);">FCFA</div>
                        </div>
                        <div class="stat-card slide-up" style="animation-delay: 0.4s;">
                            <div class="stat-icon">👁️</div>
                            <div class="stat-label">Vues catalogue</div>
                            <div class="stat-value">${totalVues}</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error(error);
                // En cas d'erreur, attendre quand même 5 secondes puis afficher un message
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(0, minLoadTime - elapsedTime);
                if (remainingTime > 0) {
                    await new Promise(resolve => setTimeout(resolve, remainingTime));
                }
                document.getElementById('statsGrid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: var(--spacing-2xl);" class="fade-in">
                        <p style="color: var(--color-danger);">Erreur lors du chargement des statistiques</p>
                    </div>
                `;
            }
        }

        async function chargerCommandes() {
            const { data } = await supabase
                .from('orders')
                .select('*')
                .eq('store_id', session.store_id)
                .order('created_at', { ascending: false })
                .limit(5);

            if (!data || data.length === 0) {
                document.getElementById('commandesRecentes').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <h3>Aucune commande</h3>
                        <p>Vos commandes apparaîtront ici une fois que vos clients commenceront à commander</p>
                    </div>
                `;
                return;
            }

            document.getElementById('commandesRecentes').innerHTML = `
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Produits</th>
                                <th>Total</th>
                                <th>Statut</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(cmd => {
                                const itemsCount = Array.isArray(cmd.items) ? cmd.items.length : 0;
                                const statusClass = cmd.status === 'delivered' ? 'success' : 
                                                   cmd.status === 'confirmed' ? 'success' : 
                                                   cmd.status === 'cancelled' ? 'danger' : 'warning';
                                const statusNames = {
                                    pending: 'En attente',
                                    confirmed: 'Confirmée',
                                    preparing: 'En préparation',
                                    ready: 'Prête',
                                    delivered: 'Livrée',
                                    cancelled: 'Annulée'
                                };
                                return `
                                <tr>
                                    <td>${new Date(cmd.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                                    <td>${itemsCount} article(s)</td>
                                    <td style="font-weight: 700; color: var(--color-success);">${parseInt(cmd.total || 0).toLocaleString()} ${cmd.currency || 'XOF'}</td>
                                    <td><span class="badge badge-${statusClass}">${statusNames[cmd.status] || cmd.status || 'pending'}</span></td>
                                </tr>
                            `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        window.copierLien = async function() {
            // Nouveau format : www.site.com/slug-boutique
            const lien = window.location.origin + '/' + session.store_slug;
            
            try {
                // Méthode moderne avec Clipboard API (nécessite HTTPS ou localhost)
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(lien);
                    const { showSuccess } = await import('../js/notifications.js');
                    showSuccess('Lien copié ! Partagez-le avec vos clients');
                    return;
                }
            } catch (err) {
                console.warn('Clipboard API non disponible, utilisation du fallback');
            }
            
            // Fallback : méthode ancienne avec execCommand (fonctionne en HTTP)
            try {
                const textArea = document.createElement('textarea');
                textArea.value = lien;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                textArea.style.top = '-999999px';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                
                if (successful) {
                    const { showSuccess } = await import('../js/notifications.js');
                    showSuccess('Lien copié ! Partagez-le avec vos clients');
                } else {
                    throw new Error('execCommand failed');
                }
            } catch (err) {
                console.error('Erreur lors de la copie:', err);
                const { showError } = await import('../js/notifications.js');
                showError('Impossible de copier le lien. Veuillez le sélectionner manuellement.');
            }
        };

        chargerStats();
        chargerCommandes();
    </script>
</body>
</html>
