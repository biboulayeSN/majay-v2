<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SAMASTORE</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/output.css">
</head>

<body class="dashboard-page">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">&#9776;</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SAMASTORE</div>
            </div>
            <nav class="sidebar-nav" id="mainNav">
            </nav>
            <div class="sidebar-footer">
                <a href="#" data-route="abonnements.html" class="sidebar-plan-badge" id="userPlan"
                    title="Gerer mon abonnement" aria-label="Plan actuel"
                    style="background: #f7f7f5; color: #37352f; border: 1px solid #e5e5e3;">FREE</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Tableau de bord</h1>
                        <p class="page-subtitle">Bienvenue, <span id="userName">Vendeur</span></p>
                    </div>
                </div>

                <div class="stats-grid" id="statsGrid">
                    <div style="grid-column: 1/-1; text-align: center; padding: 32px;">
                        <p class="text-text-secondary text-sm">Chargement des statistiques...</p>
                    </div>
                </div>

                <div class="actions-grid">
                    <a href="#" data-route="produits.html" class="action-card" role="button"
                        aria-label="Gerer mes produits">
                        <h3 class="text-sm font-semibold text-text mb-1">Gerer mes produits</h3>
                        <p class="text-text-secondary text-xs">Ajouter, modifier ou supprimer</p>
                    </a>

                    <button type="button" onclick="copierLien()" class="action-card text-left" aria-label="Partager ma boutique">
                        <h3 class="text-sm font-semibold text-text mb-1">Partager ma boutique</h3>
                        <p class="text-text-secondary text-xs">Copier le lien</p>
                    </button>

                    <a href="#" data-route="commandes.html" class="action-card" role="button"
                        aria-label="Mes commandes">
                        <h3 class="text-sm font-semibold text-text mb-1">Mes commandes</h3>
                        <p class="text-text-secondary text-xs">Historique et suivi</p>
                    </a>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="text-base font-semibold text-text">Commandes recentes</h2>
                    </div>
                    <div class="card-body" id="commandesRecentes">
                        <div class="empty-state">
                            <p class="text-text-secondary text-sm">Chargement...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initVendorApp } from "../js/vendor-app.js";
        initVendorApp();
    </script>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { authSAMASTORE } from "../js/auth.js";

        const session = authSAMASTORE.getSession();
        if (!session) window.location.href = 'connexion.html';

        window.upgradePlan = function (plan) {
            const msg = `
Bonjour,
Je souhaite passer au plan ${plan.toUpperCase()}.

Boutique : ${session.store_name}
Telephone : ${session.phone}
Slug : ${session.store_slug}
`;
            window.open(
                "https://wa.me/221771234567?text=" + encodeURIComponent(msg),
                "_blank"
            );
        };

        document.getElementById('userName').textContent = session.store_name || session.full_name;

        async function chargerStats() {
            document.getElementById('statsGrid').innerHTML = `
                <div style="grid-column: 1/-1; padding: 32px; text-align: center;">
                    <div class="loading-progress">
                        <div class="loading-progress-bar"></div>
                    </div>
                    <p class="text-text-secondary text-sm mt-3">Chargement des statistiques...</p>
                </div>
            `;

            try {
                const [produitsResult, commandesResult, vuesResult] = await Promise.all([
                    supabase
                        .from('products')
                        .select('id')
                        .eq('store_id', session.store_id)
                        .eq('is_active', true),
                    supabase
                        .from('orders')
                        .select('total')
                        .eq('store_id', session.store_id),
                    supabase
                        .from('click_events')
                        .select('*', { count: 'exact', head: true })
                        .eq('store_id', session.store_id)
                        .eq('event_type', 'view')
                ]);

                const produits = produitsResult.data || [];
                const commandes = commandesResult.data || [];
                const totalVues = vuesResult.count || 0;

                const nbProduits = produits.length || 0;
                const nbCommandes = commandes.length || 0;
                const totalVentes = commandes.reduce((sum, c) => sum + (parseInt(c.total) || 0), 0) || 0;

                const allStatsZero = nbProduits === 0 && nbCommandes === 0 && totalVentes === 0 && totalVues === 0;

                if (allStatsZero) {
                    document.getElementById('statsGrid').innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 48px 24px;">
                            <h3 class="text-base font-semibold text-text mb-2">Aucune transaction enregistree</h3>
                            <p class="text-text-secondary text-sm">Vos statistiques apparaitront ici une fois que vous aurez des produits et des commandes.</p>
                        </div>
                    `;
                } else {
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card">
                            <div class="stat-label">Produits actifs</div>
                            <div class="stat-value">${nbProduits}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Commandes</div>
                            <div class="stat-value">${nbCommandes}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Ventes totales</div>
                            <div class="stat-value">${totalVentes.toLocaleString()}</div>
                            <div class="text-xs text-text-secondary mt-1">FCFA</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Vues catalogue</div>
                            <div class="stat-value">${totalVues}</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error(error);
                document.getElementById('statsGrid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 32px;">
                        <p class="text-danger text-sm">Erreur lors du chargement des statistiques</p>
                    </div>
                `;
            }
        }

        async function chargerCommandes() {
            const { data } = await supabase
                .from('orders')
                .select('*')
                .eq('store_id', session.store_id)
                .order('created_at', { ascending: false })
                .limit(5);

            if (!data || data.length === 0) {
                document.getElementById('commandesRecentes').innerHTML = `
                    <div class="empty-state">
                        <p class="text-text-secondary text-sm">Aucune commande. Vos commandes apparaitront ici.</p>
                    </div>
                `;
                return;
            }

            document.getElementById('commandesRecentes').innerHTML = `
                <div style="overflow-x: auto;">
                    <table class="w-full text-sm">
                        <thead class="bg-bg-secondary">
                            <tr>
                                <th class="text-left py-2 px-3 text-xs font-semibold text-text-secondary uppercase">Date</th>
                                <th class="text-left py-2 px-3 text-xs font-semibold text-text-secondary uppercase">Produits</th>
                                <th class="text-left py-2 px-3 text-xs font-semibold text-text-secondary uppercase">Total</th>
                                <th class="text-left py-2 px-3 text-xs font-semibold text-text-secondary uppercase">Statut</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(cmd => {
                const itemsCount = Array.isArray(cmd.items) ? cmd.items.length : 0;
                const statusClass = cmd.status === 'delivered' ? 'success' :
                    cmd.status === 'confirmed' ? 'success' :
                        cmd.status === 'cancelled' ? 'danger' : 'warning';
                const statusNames = {
                    pending: 'En attente',
                    confirmed: 'Confirmee',
                    preparing: 'En preparation',
                    ready: 'Prete',
                    delivered: 'Livree',
                    cancelled: 'Annulee'
                };
                return `
                                <tr class="border-b border-border">
                                    <td class="py-2 px-3">${new Date(cmd.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                                    <td class="py-2 px-3">${itemsCount} article(s)</td>
                                    <td class="py-2 px-3 font-semibold">${parseInt(cmd.total || 0).toLocaleString()} ${cmd.currency || 'XOF'}</td>
                                    <td class="py-2 px-3"><span class="badge badge-${statusClass}">${statusNames[cmd.status] || cmd.status || 'pending'}</span></td>
                                </tr>
                            `;
            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        window.copierLien = async function () {
            const lien = 'https://www.nayatoo.com/' + session.store_slug;

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(lien);
                    const { showSuccess } = await import('../js/notifications.js');
                    showSuccess('Lien copie ! Partagez-le avec vos clients');
                    return;
                }
            } catch (err) {
                console.warn('Clipboard API non disponible');
            }

            try {
                const textArea = document.createElement('textarea');
                textArea.value = lien;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                textArea.style.top = '-999999px';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);

                if (successful) {
                    const { showSuccess } = await import('../js/notifications.js');
                    showSuccess('Lien copie ! Partagez-le avec vos clients');
                } else {
                    throw new Error('execCommand failed');
                }
            } catch (err) {
                const { showError } = await import('../js/notifications.js');
                showError('Impossible de copier le lien.');
            }
        };

        chargerStats();
        chargerCommandes();
    </script>
</body>

</html>
