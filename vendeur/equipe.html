<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipe - SAMASTORE</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="dashboard-page">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">&#9776;</span>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="dashboard-wrapper">
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SAMASTORE</div>
            </div>
            <nav class="sidebar-nav" id="mainNav">
                <a href="dashboard.html" class="sidebar-nav-link">Dashboard</a>
                <a href="produits.html" class="sidebar-nav-link">Produits</a>
                <a href="commandes.html" class="sidebar-nav-link">Commandes</a>
                <a href="clients.html" class="sidebar-nav-link">Clients</a>
                <a href="analytics.html" class="sidebar-nav-link">Analytics</a>
                <a href="abonnements.html" class="sidebar-nav-link">Abonnements</a>
                <a href="equipe.html" class="sidebar-nav-link active">Equipe</a>
                <a href="multi-boutiques.html" class="sidebar-nav-link">Multi-Boutiques</a>
                <a href="profil.html" class="sidebar-nav-link">Profil</a>
            </nav>
            <div class="sidebar-footer">
                <a href="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan">FREE</a>
            </div>
        </aside>
        <main class="dashboard-main">
            <div class="dashboard-main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Mon Equipe</h1>
                        <p class="page-subtitle">Gerez les membres de votre equipe</p>
                    </div>
                </div>
                <div id="planWarning" class="card mb-4" style="display: none;">
                    <div class="card-body">
                        <p class="text-warning font-medium">Cette fonctionnalite est disponible uniquement avec le plan Entreprise</p>
                    </div>
                </div>
                <div id="teamGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="card">
                        <div class="card-body text-center p-8">
                            <div class="loader"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module">
        import { teamUtils } from "../js/team.js";
        import { authSAMASTORE } from "../js/auth.js";

        const session = authSAMASTORE.getSession();
        if (!session) window.location.href = 'connexion.html';

        window.toggleSidebar = function() {
            const s = document.getElementById('dashboardSidebar');
            const o = document.getElementById('sidebarOverlay');
            if (s.classList.contains('open')) {
                s.classList.remove('open'); o.classList.remove('active');
                document.getElementById('toggleIcon').textContent = '\u2630';
            } else {
                s.classList.add('open'); o.classList.add('active');
                document.getElementById('toggleIcon').textContent = '\u2715';
            }
        };
        window.closeSidebar = function() {
            document.getElementById('dashboardSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('toggleIcon').textContent = '\u2630';
        };

        const userPlan = document.getElementById('userPlan');
        if (userPlan) {
            userPlan.textContent = (session.subscription_plan || 'free').toUpperCase();
            userPlan.className = `sidebar-plan-badge badge-${session.subscription_plan || 'free'}`;
        }

        if (session.subscription_plan !== 'entreprise') {
            document.getElementById('planWarning').style.display = 'block';
        }

        async function chargerEquipe() {
            try {
                const result = await teamUtils.getTeamMembers();
                if (!result.success) {
                    throw new Error(result.error);
                }

                const members = result.data || [];
                if (members.length === 0) {
                    document.getElementById('teamGrid').innerHTML = `
                        <div class="col-span-full card">
                            <div class="card-body text-center p-8">
                                <p class="text-text-secondary">Aucun membre d'equipe</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                document.getElementById('teamGrid').innerHTML = members.map(m => {
                    const user = Array.isArray(m.user) ? m.user[0] : m.user;
                    return `
                    <div class="card">
                        <div class="card-body">
                            <h3 class="font-bold text-text mb-2">${user?.full_name || 'N/A'}</h3>
                            <p class="text-sm text-text-secondary mb-1">${user?.phone || 'N/A'}</p>
                            <p class="text-sm text-text-secondary">Role: <span class="badge badge-info">${m.role}</span></p>
                        </div>
                    </div>
                `;
                }).join('');
            } catch (error) {
                console.error(error);
            }
        }

        chargerEquipe();
    </script>
</body>
</html>
