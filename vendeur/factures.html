<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factures - SAMASTORE</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="dashboard-page">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">&#9776;</span>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="dashboard-wrapper">
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SAMASTORE</div>
            </div>
            <nav class="sidebar-nav" id="mainNav">
                <a href="dashboard.html" class="sidebar-nav-link">Dashboard</a>
                <a href="produits.html" class="sidebar-nav-link">Produits</a>
                <a href="commandes.html" class="sidebar-nav-link">Commandes</a>
                <a href="clients.html" class="sidebar-nav-link">Clients</a>
                <a href="analytics.html" class="sidebar-nav-link">Analytics</a>
                <a href="abonnements.html" class="sidebar-nav-link">Abonnements</a>
                <a href="factures.html" class="sidebar-nav-link active">Factures</a>
                <a href="profil.html" class="sidebar-nav-link">Profil</a>
            </nav>
            <div class="sidebar-footer">
                <a href="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan">FREE</a>
            </div>
        </aside>
        <main class="dashboard-main">
            <div class="dashboard-main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Mes Factures</h1>
                        <p class="page-subtitle">Historique de vos factures d'abonnement</p>
                    </div>
                </div>
                <div id="invoicesList">
                    <div class="card">
                        <div class="card-body text-center p-8">
                            <div class="loader"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module">
        import { subscriptionsUtils } from "../js/subscriptions.js";
        import { authSAMASTORE } from "../js/auth.js";

        const session = authSAMASTORE.getSession();
        if (!session) window.location.href = 'connexion.html';

        window.toggleSidebar = function() {
            const s = document.getElementById('dashboardSidebar');
            const o = document.getElementById('sidebarOverlay');
            if (s.classList.contains('open')) {
                s.classList.remove('open'); o.classList.remove('active');
                document.getElementById('toggleIcon').textContent = '\u2630';
            } else {
                s.classList.add('open'); o.classList.add('active');
                document.getElementById('toggleIcon').textContent = '\u2715';
            }
        };
        window.closeSidebar = function() {
            document.getElementById('dashboardSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('toggleIcon').textContent = '\u2630';
        };

        const userPlan = document.getElementById('userPlan');
        if (userPlan) {
            userPlan.textContent = (session.subscription_plan || 'free').toUpperCase();
            userPlan.className = `sidebar-plan-badge badge-${session.subscription_plan || 'free'}`;
        }

        const plan = session.subscription_plan || 'free';
        if (plan === 'entreprise') {
            const nav = document.getElementById('mainNav');
            const profil = nav.querySelector('[href="profil.html"]');
            const equipeLink = document.createElement('a');
            equipeLink.href = 'equipe.html';
            equipeLink.className = 'sidebar-nav-link';
            equipeLink.textContent = 'Equipe';
            nav.insertBefore(equipeLink, profil);

            const multiLink = document.createElement('a');
            multiLink.href = 'multi-boutiques.html';
            multiLink.className = 'sidebar-nav-link';
            multiLink.textContent = 'Multi-Boutiques';
            nav.insertBefore(multiLink, profil);
        }

        async function chargerFactures() {
            try {
                const result = await subscriptionsUtils.getInvoices();
                if (!result.success) {
                    throw new Error(result.error);
                }

                const invoices = result.data || [];
                if (invoices.length === 0) {
                    document.getElementById('invoicesList').innerHTML = `
                        <div class="card">
                            <div class="card-body text-center p-8">
                                <p class="text-text-secondary">Aucune facture</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                document.getElementById('invoicesList').innerHTML = invoices.map(inv => {
                    const statusNames = {
                        unpaid: 'Non payee',
                        partial: 'Partielle',
                        paid: 'Payee',
                        overdue: 'En retard',
                        refunded: 'Remboursee'
                    };
                    const statusClass = inv.payment_status === 'paid' ? 'badge-success' :
                                       inv.payment_status === 'overdue' ? 'badge-danger' : 'badge-warning';
                    return `
                    <div class="card mb-3">
                        <div class="card-body">
                            <div class="flex justify-between items-center flex-wrap gap-4">
                                <div>
                                    <h3 class="font-bold text-text">${inv.invoice_number}</h3>
                                    <p class="text-sm text-text-secondary">${new Date(inv.issued_at).toLocaleDateString('fr-FR')}</p>
                                </div>
                                <div class="text-right">
                                    <div class="text-lg font-bold text-primary">${parseInt(inv.amount || 0).toLocaleString()} ${inv.currency || 'XOF'}</div>
                                    <span class="badge ${statusClass} mt-1">${statusNames[inv.payment_status] || inv.payment_status}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                }).join('');
            } catch (error) {
                console.error(error);
            }
        }

        chargerFactures();
    </script>
</body>
</html>
