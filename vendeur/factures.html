<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factures - MAJAY</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .dashboard-page { background: #f7fafc; }
        .dashboard-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .dashboard-header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dashboard-logo { font-size: 1.5em; font-weight: 900; color: #667eea; }
        .dashboard-nav { display: flex; gap: 20px; }
        .nav-link {
            color: #718096;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 15px;
            border-radius: 8px;
        }
        .nav-link.active { background: #edf2f7; color: #667eea; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .invoice-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="dashboard-page">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🛍️ MA-JAY</div>
            </div>
            
            <nav class="sidebar-nav" id="mainNav">
                <a href="dashboard.html" class="sidebar-nav-link">📊 Dashboard</a>
                <a href="produits.html" class="sidebar-nav-link">📦 Produits</a>
                <a href="commandes.html" class="sidebar-nav-link">🛒 Commandes</a>
                <a href="clients.html" class="sidebar-nav-link">👥 Clients</a>
                <a href="analytics.html" class="sidebar-nav-link">📈 Analytics</a>
                <a href="abonnements.html" class="sidebar-nav-link">💳 Abonnements</a>
                <a href="factures.html" class="sidebar-nav-link active">📄 Factures</a>
                <a href="profil.html" class="sidebar-nav-link">⚙️ Profil</a>
            </nav>

            <div class="sidebar-footer">
                <a href="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan" title="Gérer mon abonnement" aria-label="Plan actuel">FREE</a>
                <button onclick="window.authMaJay.deconnexion()" class="btn btn-outline btn-sm w-full" title="Déconnexion" aria-label="Se déconnecter">🚪 Déconnexion</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-main-content">
        <h1 style="font-size: 2em; margin-bottom: 30px;">Mes Factures</h1>
        <div id="invoicesList">
            <div class="loader"></div>
        </div>
    </div>

    <script type="module">
        import { subscriptionsUtils } from "../js/subscriptions.js";
        import { authMaJay } from "../js/auth.js";

        const session = authMaJay.getSession();
        if (!session) window.location.href = 'connexion.html';

        // Sidebar toggle functions
        function toggleSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            
            if (isOpen) {
                closeSidebar();
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('active');
                document.getElementById('toggleIcon').textContent = '✕';
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.getElementById('toggleIcon').textContent = '☰';
        }

        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;

        // Mettre à jour le badge du plan dans la sidebar
        const userPlan = document.getElementById('userPlan');
        if (userPlan) {
            userPlan.textContent = (session.subscription_plan || 'free').toUpperCase();
            userPlan.className = `sidebar-plan-badge badge-${session.subscription_plan || 'free'}`;
        }

        // Afficher les liens conditionnels selon le plan
        const plan = session.subscription_plan || 'free';
        if (plan === 'entreprise') {
            const nav = document.getElementById('mainNav');
            const equipeLink = document.createElement('a');
            equipeLink.href = 'equipe.html';
            equipeLink.className = 'sidebar-nav-link';
            equipeLink.textContent = '👥 Équipe';
            nav.insertBefore(equipeLink, nav.lastElementChild);
            
            const multiLink = document.createElement('a');
            multiLink.href = 'multi-boutiques.html';
            multiLink.className = 'sidebar-nav-link';
            multiLink.textContent = '🏪 Multi-Boutiques';
            nav.insertBefore(multiLink, nav.lastElementChild);
        }

        async function chargerFactures() {
            try {
                const result = await subscriptionsUtils.getInvoices();
                if (!result.success) {
                    throw new Error(result.error);
                }

                const invoices = result.data || [];
                if (invoices.length === 0) {
                    document.getElementById('invoicesList').innerHTML = `
                        <div style="text-align: center; padding: 60px; color: #718096;">
                            <div style="font-size: 4em; margin-bottom: 20px;">📄</div>
                            <p>Aucune facture</p>
                        </div>
                    `;
                    return;
                }

                document.getElementById('invoicesList').innerHTML = invoices.map(inv => {
                    const statusNames = {
                        unpaid: '❌ Non payée',
                        partial: '⚠️ Partielle',
                        paid: '✅ Payée',
                        overdue: '🔴 En retard',
                        refunded: '↩️ Remboursée'
                    };
                    return `
                    <div class="invoice-card">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3>${inv.invoice_number}</h3>
                                <p>${new Date(inv.issued_at).toLocaleDateString('fr-FR')}</p>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 1.5em; font-weight: 700; color: #25D366;">${parseInt(inv.amount || 0).toLocaleString()} ${inv.currency || 'XOF'}</div>
                                <div style="margin-top: 5px;">${statusNames[inv.payment_status] || inv.payment_status}</div>
                            </div>
                        </div>
                    </div>
                `;
                }).join('');
            } catch (error) {
                console.error(error);
            }
        }

        chargerFactures();
    </script>
            </div>
        </main>
    </div>
</body>
</html>
