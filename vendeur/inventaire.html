<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventaire Physique - SAMASTORE</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/output.css">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #37352f;
            --ios-text-secondary: #8E8E93;
            --ios-blue: #2383e2;
            --ios-green: #34C759;
            --ios-orange: #FF9500;
            --ios-red: #FF3B30;
            --ios-separator: #C6C6C8;
        }

        body {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .inventory-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 20px;
        }

        .inventory-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--ios-text);
            margin-bottom: 12px;
        }

        .progress-container {
            height: 4px;
            background: #E5E5EA;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-bar {
            height: 100%;
            background: var(--ios-blue);
            width: 0%;
            transition: width 0.3s ease;
        }

        .search-container {
            position: relative;
        }

        .ios-search-input {
            width: 100%;
            background: #E3E3E8;
            border: none;
            border-radius: 10px;
            padding: 12px 16px 12px 16px;
            font-size: 16px;
            color: var(--ios-text);
            outline: none;
        }

        .ios-search-input:focus {
            background: #D1D1D6;
        }

        .inventory-list {
            padding: 20px;
            padding-bottom: 100px;
            max-width: 800px;
            margin: 0 auto;
        }

        .product-card-ios {
            background: var(--ios-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .product-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: #F2F2F7;
        }

        .product-details {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--ios-text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-sku {
            font-size: 13px;
            color: var(--ios-text-secondary);
            font-weight: 500;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            margin-top: 6px;
            display: inline-block;
        }

        .status-match {
            background: rgba(52, 199, 89, 0.1);
            color: var(--ios-green);
        }

        .status-discrepancy {
            background: rgba(255, 149, 0, 0.1);
            color: var(--ios-orange);
        }

        .stepper-container {
            display: flex;
            align-items: center;
            background: #F2F2F7;
            border-radius: 8px;
            padding: 4px;
        }

        .stepper-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: #FFFFFF;
            color: var(--ios-text);
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .stepper-input {
            width: 44px;
            text-align: center;
            background: transparent;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--ios-text);
            outline: none;
            -moz-appearance: textfield;
        }

        .stepper-input::-webkit-outer-spin-button,
        .stepper-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .fab-scan {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            background: var(--ios-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            z-index: 200;
        }

        .bottom-action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid #e2e8f0;
            padding: 16px 20px;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .btn-complete {
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Header Section -->
    <header class="inventory-header">
        <div class="flex items-center justify-between mb-4">
            <a href="produits.html" class="font-semibold text-base no-underline flex items-center gap-1" style="color: #2383e2;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
                Retour
            </a>
            <div class="font-semibold text-gray-500 text-sm">Jan 28, 2026</div>
        </div>

        <h1 class="inventory-title">Inventaire Physique</h1>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>

        <div class="search-container">
            <input type="text" class="ios-search-input" placeholder="Rechercher nom ou SKU..." id="searchInput">
        </div>
    </header>

    <!-- Product List -->
    <div class="inventory-list" id="inventoryList">
        <!-- Products will be injected here via JS -->
        <div class="text-center py-10 text-gray-400">Chargement...</div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab-scan" onclick="simulateScan()">
        Scan
    </button>

    <!-- Bottom Action Bar -->
    <div class="bottom-action-bar">
        <button class="btn-complete" onclick="completeInventory()">
            Terminer la Saisie
        </button>
    </div>

    <script type="module" src="../js/inventory.js"></script>
</body>

</html>
