<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Boutiques - SAMASTORE</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="dashboard-page">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">&#9776;</span>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="dashboard-wrapper">
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">SAMASTORE</div>
            </div>
            <nav class="sidebar-nav" id="mainNav">
                <a href="dashboard.html" class="sidebar-nav-link">Dashboard</a>
                <a href="produits.html" class="sidebar-nav-link">Produits</a>
                <a href="commandes.html" class="sidebar-nav-link">Commandes</a>
                <a href="clients.html" class="sidebar-nav-link">Clients</a>
                <a href="analytics.html" class="sidebar-nav-link">Analytics</a>
                <a href="abonnements.html" class="sidebar-nav-link">Abonnements</a>
                <a href="equipe.html" class="sidebar-nav-link">Equipe</a>
                <a href="multi-boutiques.html" class="sidebar-nav-link active">Multi-Boutiques</a>
                <a href="profil.html" class="sidebar-nav-link">Profil</a>
            </nav>
            <div class="sidebar-footer">
                <a href="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan">FREE</a>
            </div>
        </aside>
        <main class="dashboard-main">
            <div class="dashboard-main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Mes Boutiques</h1>
                        <p class="page-subtitle">Gerez vos differentes boutiques</p>
                    </div>
                </div>
                <div id="planWarning" class="card mb-4" style="display: none;">
                    <div class="card-body">
                        <p class="text-warning font-medium">Cette fonctionnalite est disponible uniquement avec le plan Entreprise</p>
                    </div>
                </div>
                <div id="storesList">
                    <div class="card">
                        <div class="card-body text-center p-8">
                            <div class="loader"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module">
        import { storesUtils } from "../js/stores.js";
        import { authSAMASTORE } from "../js/auth.js";

        const session = authSAMASTORE.getSession();
        if (!session) window.location.href = 'connexion.html';

        window.toggleSidebar = function() {
            const s = document.getElementById('dashboardSidebar');
            const o = document.getElementById('sidebarOverlay');
            if (s.classList.contains('open')) {
                s.classList.remove('open'); o.classList.remove('active');
                document.getElementById('toggleIcon').textContent = '\u2630';
            } else {
                s.classList.add('open'); o.classList.add('active');
                document.getElementById('toggleIcon').textContent = '\u2715';
            }
        };
        window.closeSidebar = function() {
            document.getElementById('dashboardSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('toggleIcon').textContent = '\u2630';
        };

        const userPlan = document.getElementById('userPlan');
        if (userPlan) {
            userPlan.textContent = (session.subscription_plan || 'free').toUpperCase();
            userPlan.className = `sidebar-plan-badge badge-${session.subscription_plan || 'free'}`;
        }

        if (session.subscription_plan !== 'entreprise') {
            document.getElementById('planWarning').style.display = 'block';
        }

        async function chargerBoutiques() {
            try {
                const result = await storesUtils.getOwnerStores(session.user_id);
                if (!result.success) {
                    throw new Error(result.error);
                }

                const stores = result.data || [];
                if (stores.length === 0) {
                    document.getElementById('storesList').innerHTML = `
                        <div class="card">
                            <div class="card-body text-center p-8">
                                <p class="text-text-secondary">Aucune boutique</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                document.getElementById('storesList').innerHTML = stores.map(store => {
                    const isCurrent = store.store_id === session.store_id;
                    return `
                    <div class="card mb-3 ${isCurrent ? 'border-primary' : ''}" ${!isCurrent ? `onclick="switchStore('${store.store_id}')" style="cursor:pointer;"` : ''}>
                        <div class="card-body">
                            <div class="flex justify-between items-center flex-wrap gap-4">
                                <div>
                                    <h3 class="font-bold text-text">${store.store_name} ${isCurrent ? '<span class="badge badge-info ml-2">Actuelle</span>' : ''}</h3>
                                    <p class="text-sm text-text-secondary mt-1">Slug: ${store.slug}</p>
                                    <p class="text-sm text-text-secondary">Plan: ${store.subscription_plan}</p>
                                </div>
                                ${!isCurrent ? '<button class="btn btn-primary btn-sm">Basculer</button>' : ''}
                            </div>
                        </div>
                    </div>
                `;
                }).join('');
            } catch (error) {
                console.error(error);
            }
        }

        window.switchStore = async function(storeId) {
            const result = await storesUtils.switchStore(storeId);
            if (result.success) {
                window.location.reload();
            } else {
                const { showError } = await import('../js/notifications.js');
                showError(result.error);
            }
        };

        chargerBoutiques();
    </script>
</body>
</html>
