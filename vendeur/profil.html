<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - MAJAY</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .dashboard-page { background: #f7fafc; }
        .dashboard-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .dashboard-header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dashboard-logo { font-size: 1.5em; font-weight: 900; color: #667eea; }
        .dashboard-nav { display: flex; gap: 20px; }
        .nav-link {
            color: #718096;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 15px;
            border-radius: 8px;
        }
        .nav-link.active { background: #edf2f7; color: #667eea; }
        .dashboard-container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
        }
        .profile-header {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 30px;
        }
        .profile-icon {
            font-size: 5em;
            margin-bottom: 15px;
        }
        .shop-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 12px;
            margin-top: 20px;
        }
        .shop-link input {
            flex: 1;
            border: none;
            background: transparent;
            font-weight: 600;
            color: #667eea;
        }
        .copy-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body class="dashboard-page">
    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span id="toggleIcon">☰</span>
    </button>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🛍️ MA-JAY</div>
            </div>
            
            <nav class="sidebar-nav" id="mainNav">
                <a href="dashboard.html" class="sidebar-nav-link">📊 Dashboard</a>
                <a href="produits.html" class="sidebar-nav-link">📦 Produits</a>
                <a href="commandes.html" class="sidebar-nav-link">🛒 Commandes</a>
                <a href="clients.html" class="sidebar-nav-link">👥 Clients</a>
                <a href="analytics.html" class="sidebar-nav-link">📈 Analytics</a>
                <a href="abonnements.html" class="sidebar-nav-link">💳 Abonnements</a>
                <a href="profil.html" class="sidebar-nav-link active">⚙️ Profil</a>
            </nav>

            <div class="sidebar-footer">
                <a href="abonnements.html" class="sidebar-plan-badge badge-info" id="userPlan" title="Gérer mon abonnement" aria-label="Plan actuel">FREE</a>
                <button onclick="window.authMaJay.deconnexion()" class="btn btn-outline btn-sm w-full" title="Déconnexion" aria-label="Se déconnecter">🚪 Déconnexion</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-main-content">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-icon">👤</div>
                <h1 id="vendeurNom">Ma Boutique</h1>
                <span class="badge" id="vendeurPlan">FREE</span>
            </div>

            <form id="profilForm" class="auth-form">
                <div class="form-group">
                    <label>Nom de la boutique</label>
                    <input type="text" id="nom" required>
                </div>

                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="telephone" disabled style="background: #f7fafc;">
                    <span class="form-hint">Le téléphone ne peut pas être modifié</span>
                </div>

                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="tel" id="whatsapp" required>
                </div>

                <div class="form-group">
                    <label>Bio / Description</label>
                    <input type="text" id="bio" placeholder="Décrivez votre boutique">
                </div>

                <button type="submit" class="btn-primary">💾 Enregistrer les modifications</button>
            </form>

            <div class="shop-link">
                <span>🔗</span>
                <input type="text" id="shopLink" readonly>
                <button class="copy-btn" onclick="copierLien()">Copier</button>
            </div>
        </div>

        <div class="profile-card">
            <h2 style="margin-bottom: 20px;">⚠️ Zone dangereuse</h2>
            <button class="btn-danger" onclick="supprimerCompte()" style="background: #ff4757; color: white; width: 100%;">
                🗑️ Supprimer mon compte
            </button>
        </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from "../js/config.js";
        import { authMaJay } from "../js/auth.js";

        const session = authMaJay.getSession();
        if (!session) window.location.href = 'connexion.html';

        // Mettre à jour le badge du plan dans la sidebar
        const userPlan = document.getElementById('userPlan');
        if (userPlan) {
            userPlan.textContent = (session.subscription_plan || 'free').toUpperCase();
            userPlan.className = `sidebar-plan-badge badge-${session.subscription_plan || 'free'}`;
        }

        // Afficher les liens conditionnels selon le plan
        const plan = session.subscription_plan || 'free';
        if (plan === 'entreprise') {
            const nav = document.getElementById('mainNav');
            const equipeLink = document.createElement('a');
            equipeLink.href = 'equipe.html';
            equipeLink.className = 'sidebar-nav-link';
            equipeLink.textContent = '👥 Équipe';
            nav.insertBefore(equipeLink, nav.lastElementChild);
            
            const multiLink = document.createElement('a');
            multiLink.href = 'multi-boutiques.html';
            multiLink.className = 'sidebar-nav-link';
            multiLink.textContent = '🏪 Multi-Boutiques';
            nav.insertBefore(multiLink, nav.lastElementChild);
        }

        // Sidebar toggle functions
        function toggleSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            
            if (isOpen) {
                closeSidebar();
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('active');
                document.getElementById('toggleIcon').textContent = '✕';
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('dashboardSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.getElementById('toggleIcon').textContent = '☰';
        }

        // Expose functions globally
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;

        // Charger les données de la boutique
        async function chargerProfil() {
            const { data: store, error } = await supabase
                .from('stores')
                .select('*')
                .eq('id', session.store_id)
                .single();

            if (error) {
                console.error(error);
                return;
            }

            document.getElementById('vendeurNom').textContent = store.name;
            document.getElementById('vendeurPlan').textContent = (store.subscription_plan || 'free').toUpperCase();
            document.getElementById('vendeurPlan').className = `badge badge-${store.subscription_plan || 'free'}`;

            document.getElementById('nom').value = store.name;
            document.getElementById('telephone').value = session.phone;
            document.getElementById('whatsapp').value = store.whatsapp_number || '';
            document.getElementById('bio').value = store.description || '';
            // Nouveau format : www.site.com/slug-boutique
            document.getElementById('shopLink').value = window.location.origin + '/' + store.slug;
        }

        chargerProfil();

        window.copierLien = async function() {
            const input = document.getElementById('shopLink');
            input.select();
            document.execCommand('copy');
            const { showSuccess } = await import('../js/notifications.js');
            showSuccess('Lien copié ! Partagez-le avec vos clients');
        };

        document.getElementById('profilForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const { error } = await supabase
                .from('stores')
                .update({
                    name: document.getElementById('nom').value.trim(),
                    whatsapp_number: document.getElementById('whatsapp').value.trim(),
                    description: document.getElementById('bio').value.trim() || null,
                    updated_at: new Date().toISOString()
                })
                .eq('id', session.store_id);

            if (error) {
                const { showError } = await import('../js/notifications.js');
                showError(error.message);
            } else {
                const { showSuccess } = await import('../js/notifications.js');
                showSuccess('Profil mis à jour avec succès !');
                // Mettre à jour la session
                session.store_name = document.getElementById('nom').value.trim();
                session.whatsapp_number = document.getElementById('whatsapp').value.trim();
                authMaJay.sauvegarderSession(session);
                chargerProfil();
            }
        });

        window.supprimerCompte = async function() {
            if (!confirm('⚠️ ATTENTION ! Cette action est irréversible. Voulez-vous vraiment supprimer votre compte ?')) return;
            if (!confirm('Toutes vos données (produits, commandes) seront perdues. Continuer ?')) return;

            // Soft delete : désactiver la boutique
            const { error } = await supabase
                .from('stores')
                .update({ 
                    is_active: false,
                    updated_at: new Date().toISOString()
                })
                .eq('id', session.store_id);

            if (error) {
                const { showError } = await import('../js/notifications.js');
                showError(error.message);
            } else {
                const { showSuccess } = await import('../js/notifications.js');
                showSuccess('Compte désactivé. Redirection...');
                setTimeout(() => {
                    authMaJay.deconnexion();
                }, 1500);
            }
        };
    </script>
</body>
</html>
